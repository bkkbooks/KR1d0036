body:
  text: 經禮補逸卷三元汪克寬撰吉禮祭先帝禮祭法夫聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之帝嚳能序星辰以著衆堯能賞均刑法以義終舜勤衆事而野死鯀障洪水而殛死禹能修鯀之功黃帝正名百物以明民共財顓頊能修之契為司徒而民成冥勤其官而水死湯以寬治民而除其虐文王以文治武王以武功去民之災此皆有功烈於民者也非此族也不在祀典案著衆謂使民興事知休作之期也賞善謂禪舜封禹稷等也能刑謂去四凶義終謂既禪二十八載乃死也野死謂征有苗死於蒼梧也殛死謂不能成其功也明民謂使之衣服有章也民成謂知五教之禮也冥契六世孫也虐災謂桀紂烈業也族猶類也釋奠禮文王世子凡學春官釋奠于其先師秋冬亦如之凡始立學者必釋奠于先聖先師及行事必以幣凡釋奠者必有合也有國故則否凡大合樂必遂養老天子視學大昕鼓徴所以警衆也衆至然後天子至乃命有司行事興秩節祭先師先聖焉有司事卒反命始之養也適東序釋奠于先老王制曰出征執有罪反釋奠于學釋菜奠大胥春入學舍菜合舞秋頒學合聲月令仲春上丁命樂正習舞釋菜天子乃帥三公九卿諸侯大夫親往視之樂記大學始教皮辨祭菜愚案禮有釋奠釋菜孔頴達正義辨之詳矣周禮春官大胥職云舍菜文王世子云釋奠及行事必以幣是則舍菜以蘋藻釋奠以牲幣豈禮有輕重乎古者士見於君以雉為摯見於師以菜為摯故釋菜用於大學始教之時用於入學習舞之際用於立學興器之後皆専為先聖先師之祭此其僅見於學宫政所以師事之也至若古之釋奠施於學者雖曰始立學者以之出征師還以之四時詩書禮樂之官皆以之然或施之社廟施之祖禰大祝甸祝皆得而用不專於先聖先師而止此其雜見於羣祀乃所以神事之也是則釋奠禮同而釋菜禮實専焉苟徒舉釋奠而廢釋菜是使尊禮先聖先師之祀特與羣祀等耳愛禮者可無辨哉祭樂祖禮大司樂凡有道者有德者使教焉死則以為樂祖祭於瞽宗祭義祀先賢於西學祭先農禮詩甫田琴瑟擊鼓以御田祖以祈甘雨以介我稷黍田祖先嗇也豐年多黍多稌止降福孔皆謂秋冬報也大田田畯至喜來方禋祀以其騂黑與其黍稷以享以祀以介景福祭爟禮司爟掌行火之政令凡祭祀則祭爟愚案祭爟禮如祭爨謂祭祀先出火之人以報其為明之功也然則有功於民者觀於此族必舉則先王制禮委曲詳備者益可見矣禮器孔子曰臧文仲安知禮燔柴於奧奧當為爨字之誤夫奧者老婦之祭也盛於盆尊於瓶祭先卜禮龜人上春釁龜祭祀先卜祭司民司祿禮司民及三年大比以萬民之數詔司冦司冦及孟冬祀司民之日獻其數于王王拜受之登于天府小司冦孟冬祀司民獻民數于王王拜受之登中于天府若祭天之司民司祿而獻民數榖數則受而藏之大蠟禮玉藻大蠟天子之祭也籥章國祭蠟則吹豳頌擊土鼓以息老物黨正國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位郊特牲天子大蠟八主先嗇而祭司嗇祭百種以報嗇饗農及郵表畷禽獸迎貓迎虎祭坊與水庸嵗十二月合聚萬物而索享之也祝辭曰土反其宅水歸其壑昆蟲無作草木歸其宅皮辨素服葛帶榛杖黃衣黃冠而祭大羅氏天子之掌鳥獸者也諸侯貢屬焉草笠而至羅氏致鹿與女而詔客告也以戒諸侯曰好田好女者亡其國天子樹瓜華不斂藏之種也八蠟以記四方四方年不順成八蠟不通以謹民財也順成之方其蠟乃通以移民也既蠟而收民息已故既蠟君子不興功禮運昔者仲尼與於蠟賓事畢出遊於觀之上喟然而嘆仲尼之嘆蓋嘆魯也言偃在側曰君子何嘆孔子曰大道之行也與三代之英丘未之逮也而有志焉類禮大祝掌六祈以同鬼神示一曰類詛祝掌類造之祝號小宗伯類社稷宗廟則為位男巫授號旁招以茅王制類乎上帝詩桓講武類禡也桓桓武王保有厥士止於昭于天皇以間之造禮大祝二曰造大會同造于廟詛祝掌類造之祝號男巫授號旁招以茅祖祝所授類造攻説禬禜之神號男巫為之招王制天子將出造乎禰諸侯將出造乎禰禬禮大祝三曰禬詛祝掌禬禜之祝號男巫授號旁招以茅女祝掌以時招梗禬禳之事以除疾殃凡以神仕者以冬日至致天神人鬼夏日至致地示物魅以禬國之凶荒民之札喪禜禮大祝四曰禜詛祝掌禬禜之祝號男巫授號旁招以茅肆師若國有大故則令國人祭翦氏掌除蠧物以攻禜攻之黨正四時之孟月吉日則屬民而讀邦法以糾戒之春秋祭禜亦如之春秋傳昭公元年鄭子産曰山川之神則水旱癘疫之災於是乎禜之日月星辰之神則霜雪風雨之不時於是乎禜之哀公六年有雲如衆赤鳥夾日而飛楚子使問諸周太史周太史曰其當王身乎若禜之可移於令尹司馬王曰除腹心之疾而置諸股肱何益遂弗禜愚案大祝六祈之中四曰禜此禜之有定名也鬯人秬鬯之共而曰禜門此禜之有定所也參之春秋傳曰山川之神則水旱癘疫之災於是乎禜之日月星辰之神則霜雪風雨之不時於是乎禜之即此又見禜之無定時也至若春秋僖公二十五年秋大水鼓用牲于門三傳未始明以禜釋之及鄭氏釋周禮乃援是為證安知春秋本文果為禜祭否乎蓋禜之為言營也初無祠宇壇壝特為蕝營域而祭之耳然此所謂門不過祭于國門之外耳非若祭法所謂祭國門與於七祝之一者也學者察焉攻禮大祝五曰攻詛祝掌攻説之祝號男巫授號旁招以茅説禮大祝六曰説詛祝掌攻説之祝號男巫授號旁招以茅庶氏掌除毒蠱以攻説禬之禱祠禮小祝掌禱祠之祝號以祈福祥順豐年逆時雨寧風旱彌災兵逺罪疾女祝掌凡內禱祠之事小宗伯大災及執事禱祠于上下神示軍旅甸役之禱祠肄儀為位都宗人國有大故則令禱祠既祭反命于國曲禮曰禱祠祭祀供給鬼神非禮不誠不莊祭脯禮族師月吉則屬民而讀邦法春秋祭脯亦如之愚案大司徒以鄉三物教萬民一曰六德二曰六行三曰六藝鄉大夫正月之吉受教法于司徒退而頒之於其鄉吏使各以教其所治族師則各掌其戒令政事而於斯讀法之時則察其六行書其孝弟睦姻有學者嵗終則會成以待大比是於學者日用飲食之間既無事而非學羣居遊息之地亦無學而非事至於教養成就德藝交修是皆學術之有統道化之有歸也其所以致人才衆多風俗美盛得無由哉五祀禮大宗伯以血祭祭五祀司服祭五祀則希冕小子掌祈于五祀案祈玄謂或為刉用毛牲曰刉刉者釁禮之事也刉五祀謂始成其宫兆時也司門凡嵗時之門受其餘曲禮天子祭五祀士喪禮疾病行禱五祀則五祀者自天子至于士皆得祭之祭法王為羣姓立七祀曰司命曰中霤曰國門曰國行曰泰厲曰户曰竈王自為立七祀諸侯為國立五祀曰司命曰中霤曰國門曰國行曰公厲諸侯自為立五祀大夫立三祀曰族厲曰門曰行適士立二祀曰門曰行庶士庶人立一祀或立户或立竈鄭康成謂天子諸侯大夫祭五祀户竈門行中霤蓋夏殷時制也祭法七祀至一祀謂周制也愚案儀法制度貴得兼賤賤不得兼貴而諸侯大夫適士祀門行不得祀户竈庶士庶人乃祀户竈何耶况曽子問篇記天子崩未殯五祀之祭不行既殯而祭則知五祀貴賤通得祭之無疑矣鄭氏凡不可通者皆以為殷周異制似臆度之辭耳且七祀三祀二祀一祀皆不見於儀禮周官今姑缺之又案血祭蓋以隂祀自血起貴氣臭也五祀五色之帝於王者宫中曰五祀鄭謂此五祀者五官之神在四郊四時迎五行之氣於四郊而祭五德之帝亦食此神焉少昊之子曰重為句芒食於木該為蓐收食於金修及熙為玄冥食於水顓頊氏之子曰黎為祝融后土食於火土考之春秋昭公二十九年左傳蔡墨曰五行之官是謂五官實列受氏姓封為上公祀為貴神社稷五祀是尊是奉木正曰句芒火正曰祝融金正曰蓐收水正曰玄冥土正曰后土獻子曰社稷五祀誰氏之五官也對曰少皥氏有四叔曰重曰該曰修曰熙實能金木及水使重為句芒該為蓐收修及熙為玄冥世不失職遂濟窮桑此其三祀也顓頊氏有子曰黎為祝融共工氏有子曰勾龍為后土此其二祀也后土為社稷田正也有烈山氏之子曰柱為稷自夏以上祀之周棄亦為稷自商以來祀之月令春祀户祭先脾夏祀竈祭先肺中央祀中霤祭先心秋祀門祭先肝冬祀行祭先腎孟冬臘五祀白虎通祭五祀天子諸侯以牛卿大夫以羊一説户以羊竈以雉中霤以豚門以犬井以豕或曰中霤用牛餘不得用豚井以魚禮運禮行於五祀而正法則焉曾子問天子崩未殯五祀之祭不行既殯而祭其祭也尸入三飯不侑酳不酢而已矣自啓至於反哭五祀之祭不行已葬而祭祀畢獻而已案特牲饋食禮祝延尸于奧迎尸而入即延坐三飯告飽祝侑尸尸又飯至于九飯畢鄭注士九飯大夫十一飯案此則諸侯十三飯天子十五飯又案特牲禮尸九飯畢主人酌酒侑尸尸飲卒爵酢主人主人受酢飲畢酌獻祝祝飲畢主人又酌獻佐食天子崩未殯五祀之禮不行者以初崩哀戚未遑祭祀雖當五祀祭時不得行既殯而祭者五祀外神不可以己私喪久廢其祭故既殯哀情稍殺而後祭也其祭也尸入三飯不侑酳不酢而已矣者今喪既殯不得純如吉禮理須宜降殺侑勸也故迎尸入奧之後尸三飯告飽則止祝更不勸侑其食使消常數也自啓至于反哭五祀之祭不行者謂欲葬之時從啓殯之後葬畢反哭以前靈柩既見哀摧更甚故五祀之祭不行已葬而祭者謂已葬反哭殯宫畢而行其祭但既葬彌吉尸入三飯之後祝乃侑尸尸食十五故攝主酳尸尸飲卒爵而酢攝主攝主飲畢酌而獻祝祝受飲畢則止無獻佐食以下之事郊社亦然王制云天地社稷為越紼而行事是與五祀同也郊社有常自啓至反哭當辟此郊社之日郊社尊故辟其日不使相妨五祀既卑若與啓反哭日相值則五祀辟其日也天地社稷去殯處逺祭時違越此紼而往赴之故去殯近暫往則還故不為越紼也唯嘗禘宗廟俟吉故王制云喪三年不祭是也祭癘禮祭法泰厲公厲族厲春秋左傳昭公七年鬼有所歸乃不為厲儺禮月令季春命國難九門磔攘以畢春氣季冬命有司大難旁磔出土牛以送寒氣方相氏帥百𨽻而時難以索室驅疫郊特牲鄉人禓孔子朝服立于阼存室神也經禮補逸卷三
