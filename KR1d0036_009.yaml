body:
  text: 經禮補逸卷九元汪克寬撰嘉禮飲食禮大宗伯以飲食之禮親宗族兄弟小宗伯掌三族之别以辨親踈大僕王燕飲則相其法小臣饗食掌事如大僕之法鍾師凡饗食奏燕樂鎛師凡祭祀鼓其金奏之樂饗食亦如之籥師祭祀則鼓羽籥之舞饗食則亦如之文王世子若公與族燕則異姓為賔膳宰為主人公與父兄齒族食世降一等公與族燕則以齒而孝弟之道達矣其族食世降一等親親之殺也愚謂盛哉先王之禮也其本在於養性防欲其用在於視聽言動周旋揖遜之間使人之視聽言動周旋揖遜一於禮則安有放其邪心驕奢淫佚蕩而莫之節者哉不放其邪心不驕奢淫佚蕩而莫之節則禍亂可息孝弟可行治教可興其立意微其為法逺矣故設其器備其物辨其數立其文以待其有事者其用則在乎視聽言動周旋揖遜之間而已然孝弟莫始於親親親親之心無所不用則燕之之禮不得而廢焉燕之之禮不得而廢則設其器備其物辨其數立其文以待其有事者於是而用之也是故莫尊乎君也君雖尊不以位加於父兄燕序必以齒者達乎孝弟之道也莫親乎同姓也然親親不可以無殺燕則族人世降一等焉凡燕之禮必主賔以備酬酢而族燕之賔主則異姓與膳宰為之者篤親親之道也夫飲食口腹之欲也而必節之以禮則驕奢淫佚平而無過也歌舞耳目之欲也而必和之以樂則言動揖遜易而無乖也莫不由親以篤乎恩有恩以著乎愛有愛以盡其禮盡其禮則言動視聽周旋揖遜之間不徒接乎耳目所以服習而安之者自得於養性防欲之幾也雖然不特宗族兄弟之親也逺而異姓諸侯之君臣以至於蠻貊夷狄之邦皆由是禮之行故人説而天下服矣人説而天下服則禍亂何由作苟禍亂不作則孝弟行而治教興矣此乃先王之所以為燕也嗚呼於此可以觀其禮之盛矣月令季冬之月命樂師大合吹而罷注嵗將終與族人大飲作樂於大寢以綴恩也王居明堂禮季冬命國為酒以合三族大傳上治祖禰下治子孫旁治昆弟合族以食序以昭繆穆别之以禮義人道竭矣愚案此言繼祖收族之禮故有上治下治旁治之道以正其恩之隆殺屬之戚疏也蓋合族以食使之有所同而尊卑之禮一序於昭穆使之有所異而親踈之義明如此則皆有禮義之别而人之道盡於此矣抑嘗論之大宗無子則族人以支子為之後為所後服斬衰三年而降本親父母為期何也蓋於所後者以尊服服之又為降已親之服所以明所後者之為重而於大宗者上以繼祖下以收族不可以絶此聖人制禮之意也或謂為人後者當易其父母之名從所後者為屬而使之無二是未考於禮也蓋父母之服當降使明所後者重而已非遂以謂當變其親也親不當變則名可得而易乎名不可得而易則期服雖除心喪三年禮不可變也而謂輒可以絶其親乎不絶其親而能使其屬之疏者相與為重親之厚者相與為輕在以禮義明其內而不在於惡其為二而強易其名於外也雖然降父母之服禮則有之矣絶父母之名禮未之前聞也禮喪服齊衰不杖期章曰為人後者為其父母服此其名之見於經未嘗易也經既不易則凡為人後者生曰本親父母沒曰考妣禮之正也愚故因昭穆之别特附其説于下以俟知禮者商確焉詩棠棣篇儐爾籩豆飲酒之飫兄弟既具和樂且孺伐木篇伐木許許釃酒有藇既有肥羜以速諸父頍辨爾酒既旨爾殽既嘉豈伊異人兄弟匪他冠禮大宗伯以冠昏之禮親成男女禮記郊特牲冠義始冠之緇布之冠也大古冠布齊則緇之其緌也適子冠於阼以著代也無大夫冠禮古者五十而後爵何大夫冠禮之有諸侯之有冠禮夏之末造也天子之元子士也天下無生而貴者也繼世以立諸侯象賢也內則二十而冠玉藻始冠緇布冠自諸侯下達冠而敝之可也玄冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也冠義曰冠者禮之始也是故古者聖王重冠古者冠禮筮日筮賔所以敬冠事敬冠事所以重禮重禮所以為國本也重冠故行之於廟行之於廟者所以尊重事三加冠禮郊特牲醮於客位嘉有成也三加彌尊喻其志也冠而字之敬其名也委貌周道也章甫殷道也母牟追堆夏后氏之道也此始加之冠也周辨殷冔詡夏收此三加之冠也三王共皮辨素積此論再加之冠也士冠禮始加祝曰令月吉日始加元服棄爾幼志順爾成德夀考維祺介爾景福再加曰吉月令辰乃申爾服敬爾威儀淑慎爾德糜壽萬年永受胡福三加曰以嵗之正以月之令咸加爾服兄弟具在以成厥德黃耉無疆受天之慶昏禮大宗伯以冠昏之禮親成男女媒氏掌萬民之判凡男女自成名以上皆書年月日名焉令男三十而娶女二十而嫁凡娶判妻入子者皆書之黨正凡黨之昏冠教其禮事掌其戒禁愚案妻由判合故云判子者謂媵娣之類非聘之正故云入夫國之男女至衆也年月日名自成名以上皆書之及其判入又書日月以告君禮不幾於繁乎詎知先王之制所以厚男女之别正婚姻之禮者其馭人倫謹始之道至簡而要也夫自有别推而至於萬物安則禮始於謹夫婦者繫於國之男女况於南面天下之主哉是故古之君子未嘗不以身化也故家人之義歸於反身二南之業本於文王世皆知內而后妃有關雎之行外而羣臣有二南之美而不知其謹始由於文王之身化也考之行露之詩野有死麕之作專言男女貞潔強暴不能侵陵彼乘約肆淫丈夫尚不能安其守顧令天下之女子能之何其盛也人徒見江漢之小國兔罝之野人莫不蒙化而善俗而不知其所以然者又本諸先王教化之行禮制之謹有以致之也於此可以觀禮而得其要矣曲禮故日月以告君齊戒以告鬼神為酒食以召鄉黨僚友以厚其别也郊特牲夫昏禮萬世之始也娶於異姓所以附逺厚别也告之以直信信事人也信婦德也一與之齊終身不改故夫死不嫁又曰昏禮不賀人之序也曽子問娶婦之家三日不舉樂思嗣親也問名禮媒氏掌凡男女自成名以上皆書年月日名焉曲禮男女非有行媒不相知名納幣禮媒氏凡嫁子娶妻入幣純帛無過五兩曲禮非受幣不交不親郊特牲幣必誠辭無不腆摯見禮郊特牲執摯以相見敬章别也案執摯所奠雁也表記無禮不相見也欲民之無相褻也親迎禮郊特牲男子親迎男先於女剛柔之義也天先乎地君先乎臣其義一也壻親御授綏親之也親之也者親之也敬而親之先王之所以得天下也出乎大門而先去聲男帥女女從男夫婦之義由此始也禮記哀公問冕而親迎不已重乎孔子對曰合二姓之好以為宗廟社稷主君何謂已重乎詩大明篇文定厥祥親迎于渭韓奕篇韓侯取妻汾王之甥蹶父之子韓侯迎止于蹶之里見舅姑禮昏義夙興婦沐浴以俟見質明贊見婦於舅姑婦執笲棗栗段修以見贊醴婦婦祭脯醢祭醴成婦禮也舅姑入室婦以特豚饋明婦順也郊特牲厥明婦盥饋舅姑卒食舅姑降自西階婦降自阼階見廟禮禮記曽子問三月而廟見稱來婦也擇日而祭禰成婦之義也愚案禮舅姑存成婚明日婦見舅姑共盥饋之禮此成昏三月擇日祭禰者則舅姑已沒而婦見于廟也非謂廟見後擇日又祭也婦人謂嫁曰歸故稱來婦詩謂之子于歸易言歸妹是矣曰成婦之義者謂生既不獲共養于舅姑廟祭亦如生存盥饋之禮明敬事之當完故曰成婦之義也考之昏義婦見舅姑贊醴婦婦祭脯醢祭醴明敬事自此始故曰成婦之禮也此雖存沒不同亦皆互文以見義耳然則見廟必待三月者父母既沒為人子者謂婦之來以成絲麻布帛以審守委積蓋藏者其事也和室人當於夫在中饋者其行也上以奉宗廟下以繼後世此又禮之重也職或不修有可去之事則不可以苟合也故必待久觀其成婦之道而後廟告焉此亦致敬於其所事也賔射禮大宗伯以賔射之禮親故舊朋友大司樂及射令奏騶虞大僕王射則贊弓矢小臣賔射掌事如大僕之法鍾師凡射王奏騶虞鏄師凡祭祀鼓其金奏之樂賔射亦如之視瞭賔射皆奏其鐘鼓典庸器祭祀帥其屬而設筍簴陳庸器賔射亦如之大史凡射事飾中舍算執其禮事司常凡射共獲旌射人治射儀王以六耦射三侯三獲三容樂以騶虞九節五正諸侯以四耦射二侯二獲二容樂以貍首七節三正孤卿大夫以三耦射一侯一獲一容樂以采蘋五節二正士以三耦射犴侯一獲一容樂以采蘩五節二正服不氏射則贊張侯以旌居乏而待獲禮記射義故射者進退周旋必中禮內志正外體直然後持弓矢審固持弓矢審固然後可以言中此可以觀德行矣祭侯禮射人祭侯則為位梓人張皮侯而棲鵠則春以功張五采之侯則逺國屬張獸侯則王以息燕祭侯之禮以酒脯醢其辭曰惟若寧侯毋或若女不寧侯不屬于王所故抗而射女強飲強食詒女曽孫諸侯百福書曰侯以明之燕賔禮樂記射鄉食饗所以正交接也射義古者諸侯之射也必先行燕禮卿大夫士之射也必先行鄉飲酒之禮故燕禮者所以明君臣之義也鄉飲酒之禮者所以明長幼之序也詩小雅賔之初筵發彼有的以祈爾爵貍首篇以燕以射則燕則譽愚案古者弦木為弧剡木為矢弧矢之利以威天下見於易繫侯以明之載於虞書則射藝已見於黃帝堯舜之時而其制度禮文則大備於周也何哉鄉三物之為教也曰六德曰六行曰六藝蓋蓄德植行而必播之以六藝射之所以為藝而次于禮樂者有足以成人之德行而觀其用舍者也古者天子以射選諸侯卿大夫士以中選之多寡為之慶讓蓋亦主乎習藝觀德之成而不專寓於禦侮克敵之備也諸侯之射必先行燕禮卿大夫之射必先行鄉飲酒之禮此則飾之以禮所以明君臣之義長幼之序也其節天子以騶虞諸侯以貍首卿大夫士以采蘋采蘩此則飾之以樂又所以養人之德使之周還中禮而各不失其節之志也故明乎此則事功成而德行立矣事功成而德行立則暴亂不作暴亂不作則身安而國家可保矣學者於此念始生桑弧蓬矢六以射天地四方必先有志於其所事勉乎心之所得身之所存事之所習以趨乎進德之階窮理之地而不愧於為男子者噫豈維射哉因并釋之燕饗禮大宗伯以燕饗之禮親四方之賔客籩人賔客之事共其薦修之籩實醢人賔客之禮共醢五十甕醯人賔客之禮共醯五十甕外府凡賔客共其財用之幣齎大司徒大賔客令野修道委積封人凡賔客則飾其牛牲牛人凡賔客之事共其牢禮積膳之牛司門凡四方之賔客造焉則以告委人賔客共其芻薪澤虞凡賔客共澤物囿人凡賔客共其生獸死獸之物場人凡賔客共其瓜蓏鬱人掌賔客之祼事和鬱鬯以實彞而陳之司服凡賔客共其衣服而奉之典瑞凡賔客之事共其玉器而奉之鍾師凡饗食奏燕樂旄人凡賔客舞燕樂鎛師凡祭祀鼓其金奏之樂饗食亦如之籥師祭祀則鼓羽籥之舞賓客饗食則亦如之司干祭祀舞者既陳則授舞器賔饗亦如之鞮鞻氏祭祀則吹而舞之燕亦如之典庸器祭祀帥其屬而設筍簴陳庸器饗食亦如之司常掌九旗之物名各有屬凡祭祀各建其旗賔客亦如之大司馬饗食羞牲魚授其祭小司馬饗射掌其事如大司馬之法量人凡饗賔制其從獻脯燔之數量羊人凡賔客共其法羊射鳥氏掌祭祀以弓矢歐烏鳶凡賔客亦如之服不氏賔客之事則抗皮射人賔客則作卿大夫從司士凡賔客作士從諸子凡賔客作羣子從旅賁氏掌執戈盾凡賔客則服而趨大僕王燕飲則相其法正視燕朝則正位掌擯相王不視朝則辭於三公及孤卿小臣正王之燕服位王之燕出入則前驅士師王燕出入則前驅而辟掌客掌四方賔客之牢禮飲食之等數凡諸侯之禮上公五積皆視飱牽三問皆修飱五牢食四十簠十豆四十鉶四十有二壺四十鼎簋十有二牲三十有六皆陳饔餼九牢其死牢如飱之陳牽四牢米百有二十筥醯醢百有二十甕車皆陳車米視生牢牢十車車秉有五籔車禾視死牢牢十車車三秅芻薪倍禾皆陳乘禽日九十雙殷膳大牢以及歸三饗三食三燕若弗酌則以幣致之侯伯四積皆視飱牽再問皆修飱四牢食三十有二簠八豆三十有二鉶二十有八壺三十有二鼎簋十有二腥二十有七皆陳饔餼七牢其死牢如飱之陳牽三牢米百筥醯醢百甕皆陳米三十車禾四十車芻薪倍禾皆陳乘禽日七十雙殷膳大牢三饗再食再燕子男三積皆視飱牽一問以修飱三牢食二十有四簠六豆二十有四鉶十有八壺二十有四鼎簋十有二牲十有八皆陳饔餼五牢其死牢如飱之陳牽二牢米八十筥醯醢八十甕皆陳米二十車禾三十車芻薪倍禾皆陳乘禽日五十雙一饗一食一燕凡諸侯之卿大夫士為國客則如其介之禮以待之詩湛露厭厭夜飲在宗載考彤弓鍾鼓既設一朝饗之鹿鳴我有旨酒以燕樂嘉賔之心春秋莊公四年夫人饗齊侯于祝丘愚案春秋傳晉侯饗齊侯宋公饗晉侯楚子饗公小邾子郯子來朝公與之燕公饗宰周公范宣子饗晉六卿于蒲圃寧俞華耦來公與之燕至鄭伯饗王王饗晉侯經皆不書而書夫人饗齊侯則以其非禮也餼獻禮掌客掌四方賔客之餼獻飲食之等數上公之禮羣介行人宰史皆有牢及歸凡介行人宰史皆有飱饔餼以其爵等為之牢禮之陳數唯上介有禽獻夫人致禮八壺八豆八籩膳大牢致饗大牢食大牢卿皆見以羔膳大牢侯伯凡介行人宰史皆有飱饔餼以其爵等為之禮唯上介有禽獻夫人致禮八壺八豆八籩膳大牢致饗大牢卿皆見以羔膳特牛子男凡介行人牢史皆有飱饔餼以其爵等為之禮唯上介有禽獻夫人致禮六壺六豆六籩膳視致饗親見卿皆膳特牛擯相禮司儀掌九儀之賔客擯相之禮以詔儀容辭令揖讓之節凡諸公相為賔主國五積三問皆三辭拜受皆旅擯主君郊勞交擯三辭及將幣交擯三辭車逆拜辱賔車進答拜三揖三讓每門止一相及廟唯上相入賔三揖三讓登再拜授幣及出車送三請三進再拜賔三還三辭告辟諸公之臣相為國客則三積皆三辭拜受及大夫郊勞旅擯三辭拜辱三讓登聽命下拜登受賔使者如初之儀及將幣旅擯三辭拜逆客辟三揖每門止一相及廟唯君相入三讓客登拜客三辟授幣下出大僕王燕飲則相其法王視燕朝則正位掌擯相玉藻小國之君曰孤擯者亦曰孤上大夫曰下臣擯者曰寡君之老下大夫自名擯者曰寡大夫公士擯則曰寡大夫寡君之老大夫有所往必與公士為擯也聘義卿為上擯大夫為承擯士為紹擯三讓而後傳命三讓而後入廟門三揖而後至階三讓而後升所以致尊讓也禮器禮有擯詔樂有相步溫之至也送逆禮訝士邦有賔客則與行人送逆之司儀王燕凡諸侯相為國主賔主君郊勞交擯三辭車逆拜辱三揖三辭拜受車送三還再拜及將幣車逆拜辱再拜授幣賔拜送幣及出車送諸公之臣相為國客及大夫郊勞旅擯三辭拜辱及退拜送及將幣拜逆客辟授幣下出君館客客辟介受命遂送凡四方之賔客禮儀辭命餼牢賜獻以二等從其爵而上下之凡賔客送逆同禮齊僕掌饗食皆乘金路其法儀各以其等為車送逆之節環人掌送逆邦國之通賔客以路節達諸四方聘義君使士迎于境大夫郊勞君親拜逆于大門之內而廟受北面拜貺拜君命之辱所以致敬也敬讓也者君子之所以相接也勞禮小行人凡諸侯入王則逆勞于畿及郊勞視館司儀凡諸公相為賔主國五積三問再勞三辭三揖登拜受拜送郊勞三辭諸公之臣相為國客則三積郊勞三辭及禮私面私獻君勞客客再拜稽首君答拜致饔餼如勞之禮曲禮大夫士見於國君君若勞之則還辟再拜稽首致贈禮司儀致饔餼還圭饗食致贈及禮私面私獻皆再拜稽首君答拜聘義君親禮賔賔私面私覿致饔餼還圭璋賄贈饗食燕所以明賓客君臣之義也愚案古者天子諸侯皆有朝聘之禮如大行人歲遍存三歲遍眺五歲遍省此天子所以撫諸侯之禮也春朝而圖天下之事時聘以結諸侯之好此諸侯所以事天子之禮也至於歲相問殷相聘世相朝此諸侯邦交之禮也禮若國君親往則大夫從王燕凡諸公相為賔主國其擯相禮儀餼牢賜獻各以其爵之等相待也聘事既畢主國君親執醴以禮賔而遂有私面私獻之禮賔皆再拜稽首所以正交接之義也致饔餼還圭璋賄贈饗食燕者賓介就館主君使卿致饋於賓而還以執來之圭加於賄贈之禮也然則大夫從君聘而以己之私物覿見主國之君面見主國之卿大夫可乎夫執圭所以申信也將幣所以致敬也私以庭實充于諸侯之庭則不敬也不敬是無王矣夫既從君聘禮無外交也外交是二君矣此皆非禮也注者謂若大夫執其君之命圭而專使則當行私覿之禮以申己之信其説悖矣夫從君而來與受命而聘一也一乃專二乃辟也考之太宰以八柄詔王馭羣臣曰祿以馭其富豫以馭其幸若相覿以貨是人臣以利交也人臣以利交則二者胥失矣二者苟失其不致於無禮奪亂者未之有也賀慶禮大宗伯以賀慶之禮親異姓之國大行人賀慶以贊諸侯之喜小行人若國有福事則令慶賀之玉藻有慶非君賜不賀士於大夫不承賀下大夫於上大夫承賀脹膰禮大宗伯以脹膰之禮親兄弟之國小宗伯饗食授祭大司馬饗食羞牲魚授其祭祭僕凡祭祀致福者展而受之大行人歸脹以交諸侯之福春秋昭公十四年天王使石尚來歸脹公羊傳脹者何爼實也腥曰脹熟曰膰愚案受脹于社是諸侯助祭而授爼實也非助祭則不授也如襄王使宰孔賜齊侯胙是齊桓有奬王之功而加以殊禮也今天王使石尚賜宜社之肉于魯非緣助祭於京師曽是以為禮乎是故受賑禮也歸脹非禮也經禮附説周禮一書果為周公所作乎漢武嘗謂周禮為瀆亂不驗之書何休又云六國隂謀之書歐文忠公謂周禮可疑者二蘇頴濵謂周禮不可信者三是皆論以為非周公之遺制也然則周禮果非周公所作乎朱子蓋嘗以周家法度廣大精密言之嘗以周公建太平之基本稱之又嘗以周公從廣大心中流出稱之張橫渠謂周公治周莫詳於周禮賈公彥序周禮廢興又謂鄭玄遍覽羣經知周禮者乃周公致太平之迹是則又明為周公所作也考之西漢志於周禮未之見東漢儒林傳乃謂周官經六篇本孔安國所獻隋經籍志乃云漢時有李氏得周官上於河間獻王獨缺冬官一篇獻王購以千金不得遂以考工記補成六篇奏之孝武時蓋有其書特未與五經例置博士耳至西漢劉歆始置博士遂盛行於世後世因有周禮作於劉歆之説是則周禮作於周公而非他人之制明矣然冬官何為而缺也經罹秦焰散帙之餘與漢儒編録附麗之誤而始謂之缺也何以知其然愚因考補散逸得之夫五官所掌曰治曰教曰禮曰政曰刑而冬官則掌邦士或坐而論道謂之王公或作而行之謂之士大夫或審曲面勢以飭五材以辨民器謂之百工通四方之珍異以資之謂之商旅飭力以長地財謂之農夫治絲麻以成之謂之婦功此冬官之大較也見考工記所載者其屬二十有九皆工之事而士與商農之職俱缺焉考之春官之中如世婦內宗外宗皆宫中之職本屬天官而乃入之春官夏官之中如司士諸子皆掌士之職本屬冬官而乃入之夏官地官之中如司市質人㕓人賈師司暴司稽胥肆長泉府此皆主於商土均草人稻人場人司稼等職此皆主於農皆本屬冬官因其職與大司徒掌土地人民者相類乃以入之地官若是者謂非編録附麗之誤不可也况小宰記六官六屬各六十考之天官自太宰以下六十二地官大司徒以下七十九春官大宗伯以下七十一夏官大司馬以下六十九秋官大司冦以下六十五何則冬官獨缺而為數不及五官皆盈而餘數過之理無是也他如儀禮有嗇夫之官國語有司商之官皆不載諸周禮此亦冬官之脫簡也要之見載於考工記者固為冬官之屬然司空掌邦土居四民時地利職不止此當自大司空小司空而下托夏官之中掌士者地官之中掌商農者與夫嗇夫司商之數并今考工記所載之工總屬冬官則不惟合於周官司空之所職與小宰六官六屬之目而且周公制作之盛粲然溢著于編使人得以觀其會通而為太平典禮之全書也克寬因并録卷末以俟博古君子正焉經禮補逸卷九
