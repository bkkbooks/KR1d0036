body:
  text: 經禮補逸卷八元汪克寛撰賔禮朝禮周禮大宗伯春見曰朝大行人春朝諸侯而圖天下之事幕人凡朝覲共其帷幕幄帟綬掌次諸侯朝覲則張大次小次小臣朝覲沃王盥司几筵凡大朝覲王位設黼依依前南向設筦筵紛純加繅席畫純加次席黼純左右玉几典瑞公執桓圭侯執信圭伯執躬圭繰皆三采三就子執穀璧男執蒲璧繰皆二采再就以朝于王大史朝覲以書協禮事執書以詔王司士正朝儀之位辨其貴賤之等三公北面東上孤東面北上卿大夫西面北上朝士掌外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後愚案周官有三公三孤之官而周禮不言其職論者乃謂師氏保氏即大師大保鄉老二鄉則公一人註則以為三公豈知師氏保氏乃中下大夫之職且未聞以傅稱而鄉老公一人乃置地官之列屬然則三公居六卿之上而遽以是為三公之師保可乎據今朝士司士所稱是則周禮未嘗不言公孤也特以六卿而上兼公孤故不正言其職以繫六官之下爾參諸周書顧命曰召太保奭芮伯彤伯畢公衛侯毛公此盖當時之六卿而奭以太保言毛畢以公言是以卿兼公故以公稱餘三人者以卿而兼孤又可以類推也此不可不辨大宗伯朝覲則為上相大司冦凡朝覲前王大僕王視朝則前正位而退入亦如之射人朝覲作大夫介校人朝覲毛馬而頒之飾幣大司徒大賔客令野脩道委積委人賔客共其芻薪肆師大賔客涖筵几築鬻賛果將鬱人掌賔客之祼事和鬱鬯以實彞而陳之旄人凡賔客舞燕樂籥師祭祀則鼓羽籥之舞賔客則亦如之餘人掌治備見燕饗賓客禮下大行人以九儀辨諸侯之命等諸臣之爵以同邦國之禮上公之禮執桓圭九寸繰藉九寸冕服九章建常九斿樊纓九就貳車九乗介九人禮九牢其朝位賓主之間九十步立當車軹擯者五人諸侯之禮執信圭七寸繅藉七寸冕服七章建常七斿樊纓七就貳車七乗介七人禮七牢朝位賓主之間七十步立當前疾擯者四人諸伯執躬圭其他皆如諸侯之禮諸子榖璧五寸繅藉五寸冕服五章建常五斿樊纓五就貳車五乗介五人禮五牢朝位賓主之間五十步立當車衡擯者三人諸男執蒲璧其他皆如諸子之禮凡諸侯之卿其禮各下其君二等以下及其大夫士皆如之邦畿方千里其外方五百里謂之侯服嵗一見又其外方五百里謂之甸服二嵗一見又其外方五百里謂之男服三嵗一見又其外方五百里謂之采服四嵗一見又其外方五百里謂之衛服五嵗一見又其外方五百里謂之要服六嵗一見愚案大司馬曰九畿職方氏曰九服服言服事天子畿猶疆限之謂其方里則同也參之周官乃曰六服五服何耶葛氏註謂侯甸男采衛并畿内謂六服程氏伯圭釋謂五服盖指甸男采衛要而侯服不在其數二説皆未安案大行人六服侯甸男采衛要是知要服即蠻服也其曰五服一朝者要服不與其列其曰九服而来朝者亦止五服蓋衛服之外聖人雖制之服令蕃國世一見而不必其来非若五服一嵗至五嵗各以所貢来見也考之武成止曰邦甸侯衛酒誥康王之誥止曰侯甸男衛康誥亦止曰侯甸男采衛而蠻夷鎮蕃不與焉於此不必辨其服之異而自得其說之同矣司儀掌九儀之賔客擯相之禮將合諸侯則令為壇三成宫旁一門詔王儀南向見諸侯土揖庶姓時揖異姓天揖同姓及其擯之各以其禮愚案大行人司儀掌九儀賔客擯相之禮而置司㓂刑官之屬其稱名也不幾於雜乎徐考六官之中若此者衆如司士掌羣官之版正朝廷之位而屬司馬之類是已論者率謂六官互相聨屬故六屬互相參錯然也豈知聨屬者此固周官立法之善然參錯者則未必若是其不倫也又案小宰記六官六屬各六十秋官自大司㓂以下尚六十五人其職屬多寡不同初無是也要亦後之編録散帙者不免遞相差易故爾觀者察焉小行人令諸侯春入貢王親受之各以其國之籍禮之凡諸侯入王則逆勞于畿及郊勞眡館將幣為承而擯曲禮天子當宁而立諸公東面諸侯西面曰朝鄭注春朝受摯於朝受享於廟䟽曰凡天子三朝一在路門内謂之燕朝太僕掌之一是路門外之朝謂之治朝司士掌之其三是臯門之内庫門之外謂之外朝朝士掌之愚案天地位而尊卑定矣卑高陳而貴賤位矣王者首出庶物德配二儀其尊貴明矣而聖人所恃以為天下者不獨恃其尊貴勢分也故於諸侯之卑其中同姓則有伯父叔父焉異姓則有伯舅叔舅焉有兄弟焉有婚姻焉於其来朝也逆勞眡館具偹多儀篤以親親之恩接以主擯之禮而恩禮雝雝於尊貴勢分之間有莫知其德之感化之至也此春朝所以異乎覲禮之受於廟而臣皆北面也夫贄貢諸侯所以述職也今也親受之於朝其志重於器物者明尊賢之禮等也祭器天子所以事神也今也用之於大饗其致敬於賔客者示事神之禮同也若是者豈天子自示寡昧而忘其尊卑之分哉盖以億兆歸命于一人未易遽化也治亂潜幾於一德而一德難乎遽孚也於是崇德率衆謙已下賢俾上之恩深下之報厚内外同奬於一心逺近咸歸於一德卒致垂拱成化享國永年而能保其尊貴者有由来矣此所以為三代之至文朝見之盛禮也書周官六年五服一朝王制天子無事與諸侯相見曰朝考禮正刑一德以尊于天子曲禮君天下曰天子朝諸侯分職受政任功曰予一人諸侯見天子曰臣某侯某案此擯者告天子之辭也凡自稱皆曰寡人樂記朝覲然後諸侯知所以臣春秋隱公十一年春滕侯薛侯来朝哀公二年夏􅅬子来朝愚案春秋書朝三十有六始於滕薛終於􅅬子然當時或受其朝禮而不報或累徃不納而以歸厚薄䟽數之節不惟無合於先王殷聘世朝之儀而諸侯於天子述職之典盖缺如也經皆書而不削以示強弱安危是非邪正為後世鍳也覲禮大宗伯秋見曰覲大行人秋覲以比邦國之功小行人令諸侯秋獻功王親受之各以其國之籍禮之訝士邦有賔客則與行人送逆之入於國則為之前驅而辟野亦如之居館則帥其屬而為之蹕小司徒乃頒比法于六鄉之大夫使各登其鄉之衆寡六畜車輦辨其物鄉師以國比之法以時稽其夫家衆寡辨其老㓜貴賤廢疾馬牛之物若國大比則考教察辭稽噐展事以詔誅賞曲禮天子當依而立諸侯北面而見天子曰覲案秋覲一受之於廟覲者位於廟門外而序入詩韓侯入覲以其介圭入覲于王大雅韓奕篇春秋左傳襄公三十一年子産曰諸侯賔至甸設庭燎覲禮諸侯辭于天子王曰伯父無事歸寧乃邦愚案此諸侯入辭而天子告之之辭也忠厚警戒藹然見之參之書文侯之命曰父義和其歸視爾師寧爾邦其義同也宗禮大宗伯夏見曰宗大行人夏宗以陳天下之謨司㑹以九貢之法致邦國之財用以九賦之法令田野之財用以九功之法令民職之財用以九式之法均節邦之財用以周知四國之治大司徒施十有二教焉一曰以祀禮教敬則民不苟二曰以陽禮敎讓則民不爭三曰以隂禮教親則民不怨四曰以樂禮敎和則民不乖五曰以義辨等則民不越六曰以俗教安則民不偷七曰以刑教中則民不虣八曰以誓教恤則民不怠九曰以度敎節則民知足十曰以世事教能則民不失職十有一曰以賢制爵則民慎德十有二曰以庸制禄則民興功齊僕以宗遇皆乗金路其法儀各以其等為車送逆之節詩朝宗于海遇禮大宗伯冬見曰遇大行人冬遇以協諸侯之慮掌交掌以節與幣廵邦國之諸侯道王之德意志慮使咸知王之好惡曲禮諸侯未及期相見曰遇春秋隱公四年夏公及宋公遇于清莊公三十二年夏宋公齊侯遇于梁丘愚案古者諸侯朝覲于王不期而遇諸塗則舉相見之禮猶存恭肅之心若春秋書遇則皆惡其簡禮之私而無合乎先王制禮之意也時㑹禮大宗伯時見曰㑹大行人時㑹以發四方之禁大宗伯㑹同則為上相大司馬㑹同則帥士庶子而掌其政令小司馬㑹同掌其事如大司馬之法射人㑹同作大夫介諸子凡㑹同作羣子從司士凡㑹同作士從小祝凡外内小㑹同掌事焉旅賁氏掌執戈盾夾王車而趨左八人右八人凡㑹則服而趨車僕凡師共革車各以其萃㑹同亦如之虎賁氏掌先後王而趨以卒伍軍旅㑹同亦如之司兵軍事建車之五兵㑹同亦如之司常掌九旗之物名各有屬凡祭祀各建其旗㑹同亦如之典路凡㑹同以路從司戈㑹同授貳車戈盾建乗車之戈盾授旅賁及虎氏戈盾掌次諸侯㑹同則張大次小次幕人凡㑹同共其帷幕幄帟綬掌舍掌王㑹同之舍設梐枑再重設車宫轅門為壇壝宫棘門為帷宫設旌門外府凡㑹同共其財用之幣齎賜予之財用廩人凡邦有㑹同之事則治其糧與其食遺人凡㑹同掌其道路之委積校人凡㑹同毛馬而頒之飾幣馬射鳥氏掌祭祀以弓矢歐烏鳶凡㑹同亦如之戎右㑹同充革車司右凡㑹同合其車之卒伍而比其乗屬其右牛人凡㑹同共其兵車之牛稍人若有㑹同則以縣師之法作其同徒輂輦帥而至縣師若將有㑹同之戒則受法于司馬以作其衆庶及馬牛車輦㑹其車人之卒伍使皆備旗鼓兵噐以帥而至司弓矢凡㑹同頒弓弩各以其物從授兵車之儀大司馬以九伐之法正邦國馮弱犯寡則眚之賊賢害民則伐之暴内凌外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弑其君則殘之犯令陵政則杜之外内亂鳥獸行則滅之大司宼凡㑹同前王小司寇乃宣布于四方憲刑禁士師掌國之五禁一曰宫禁二曰官禁三曰國禁四曰野禁五曰軍禁布憲執旌節以宣布于四方而憲邦之刑禁掌交以諭九禁之難曲禮諸侯相見於郤地曰㑹春秋隠公二年公㑹戎于潛哀公十三年夏公㑹晉侯及吴子于黄池愚案時㑹謂時見也發禁者凡諸侯有不順服王則合諸侯而發其禁令以行征討之事如九伐之法此先王時㑹之禮也春秋書㑹九十五始於濳終於黄池中間彼善於此僅有蕭魚之特筆餘皆非王事而私㑹殊非周官入㑹致事禁止不義之制矣故曰凡書㑹皆譏也殷同禮大宗伯殷見曰同大行人殷同以施天下之政小行人其禮俗政事之逆順每國辨異之以反命于王以周知天下之故大司馬掌建邦國之九法以佐王平邦國制畿封國以正邦國設儀辨位以等邦國進賢興功以作邦國建牧立監以維邦國制軍詰禁以糾邦國施貢分職以任邦國簡稽鄉民以用邦國均守平則以安邦國比小事大以和邦國正月之吉始和布政于邦國都鄙乃縣政象之法于象魏使萬民觀政象愚案周禮冬官乆亡於象法之縣否無可考也餘四官皆縣象法而何獨宗伯略焉蓋冢宰司徒司馬司寇之所職曰治曰敎曰政曰刑此皆親民之事故各縣象法以示之若宗伯所職曰禮曰樂率皆朝廷宗廟之事於民為踈逺而且禮樂實本諸人心之和順非可以象求故略之無庸縣可也或曰治教政刑皆可縣象於一時而禮樂之噐之文其為品節制度此獨不可以一二象法示人而塗斯民耳目於無聞見之地耶曰六藝十二教之目禮樂具述其中而五禮六樂中和之敎以防萬民之情偽者為尤著是以禮樂示斯民之敎者固已縣諸地官司徒之教法而宗伯則以朝廷宗廟之禮樂為專職焉學者於此無徒事乎器物示人之麤迹而必求之人心之和順以推原聖人制作之微意則禮樂中和之敎法不獨縣諸司徒而有得於吾心之實者縣象昭昭矣因并釋之乃以九畿之籍施邦國之政職方千里曰國畿其方五百里曰侯畿又其外方五百里曰甸畿又其外方五百里曰男畿又其外方五百里曰采畿又其外方五百里曰衛畿又其外方五百里曰蠻畿又其外方五百里曰夷畿又其外方五百里曰鎮畿又其外方五百里曰藩畿凡令賦以地與民制之時聘禮大宗伯時聘曰問大行人時聘以結諸侯之好小行人合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼此六物者以和諸侯之好典瑞琬圭以結好掌交掌邦國之通事而結其交好曲禮諸侯使大夫問於諸侯曰聘春秋隠公七年齊侯使其弟年来聘愚案古者諸侯間於天子之事則有使問之聘詳見儀禮篇春秋諸侯朝禮不修間自相聘書於經者二十五始於弟年終於士鞅皆惡其挟邦交之私非時聘結好之禮故觀年之書法則可以推其餘矣殷覜禮大宗伯殷覜曰視大行人殷覜以除邦國之慝王之所以撫邦國諸侯者三嵗徧覜小行人其悖逆暴亂作慝猶犯令者每國辨異之以反命于王以周知天下之故典瑞瑑圭璋璧琮繰皆二采一就以覜聘琰圭以除慝誦訓掌道方慝以詔辟忌以知土俗王巡守則先王車匡人掌達法則匡邦國而觀其慝間問禮大行人間問以諭諸侯之志掌大賔之禮以親諸侯上公之禮三問三勞諸侯之禮再問再勞諸伯如諸侯之禮諸子之禮壹問壹勞諸男如諸子之禮掌交掌以節與幣巡邦國之諸侯道王之德意志慮使咸知王之好惡誦訓掌道方志以詔觀事撢人掌誦王志道國之政事以巡天下之邦國而諭之贄貢禮大行人侯服其貢祀物甸服其貢嬪物男服其貢器物采服其貢服物衛服其貢材物要服其貢貨物將幣禮大行人上公廟中將幣三享王禮再祼而酢諸侯廟中將幣三享王禮一祼而酢諸伯如諸侯之禮諸子廟中將幣三享王禮一祼不酢諸男如諸子之禮小行人凡諸侯入將幣為承而擯司儀掌九儀賔客擯相之禮公於上等侯伯於中等子男於下等其將幣亦如之饗食禮大行人上公饗禮九獻食禮九牢出入五積諸侯饗禮七獻食禮七牢出入四積諸伯如諸侯之禮諸子饗禮五獻食禮五牢出入三積諸男如諸子之禮錫命禮大宗伯王命諸侯則擯典命掌諸臣之五等之命上公九命為伯其國家宫室車旗衣服禮儀皆以九為節侯伯七命其國家宫室車旗衣服禮儀皆以七為節子男五命其國家宫室車旗衣服禮儀皆以五為節王之三公八命其卿六命其大夫四命及其出封皆加一等其國家宫室車旗衣服禮儀亦如之書說命命之曰朝夕納誨以輔台德止欽予時命其維有終微子之命王若曰爾惟踐修厥猷舊有令聞恪慎克孝肅恭神人予嘉乃德曰篤不忘上帝時歆下民祗協庸建爾于上公尹茲東夏欽哉徃敷乃訓慎乃服命蔡仲之命王若曰小子胡惟爾率德改行克慎厥猷肆予命爾侯于東土徃即乃封敬哉畢命王曰嗚呼父師今予祗命公以周公之事徃哉冏命曰今予命汝作大正正于羣僕侍御之臣懋乃后德交修不逮文侯之命王曰父義和其歸視爾師寧爾邦用賚爾秬鬯一卣彤弓一彤矢百盧弓一盧矢百馬四匹父徃哉柔逺寧邇惠康小民無荒寧簡恤爾都用成爾顯德周易師九二王三錫命晋康侯用錫馬蕃庶晝日三接詩韓奕韓侯受命王親命之王錫韓侯淑旂綏章彤弓彤弓弨兮受言蔵之我有嘉賔中心貺之采菽君子来朝何錫予之雖無予之路車乗馬又何予之𤣥衮及黼春秋莊公元年王使榮叔来錫桓公命愚案周制諸侯踐位而入見則有錫命修聘来朝則有錫命能敵王所愾而獻功則有錫命此禮之正也若書稱蔡仲之命文侯之命詩稱王錫韓侯王命召虎之類是已若遣使就其國而錫命之禮無是也如春秋書王使榮叔来錫桓公命天王使毛伯来錫公命之類皆非正也比事以觀義自見矣左傳僖公二十八年王享醴命晋侯宥賜之大路之服戎路之服文公四年甯武子曰諸侯敵王所愾而獻其功於是乎賜之彤弓一彤矢百玈弓矢千何氏曰禮有九錫一車馬二衣服三樂器四朱户五納陛六虎賁七弓矢八鈇鉞九秬鬯王制天子賜諸侯樂則以柷將之賜伯子男樂則以鼗將之諸侯賜弓矢然後征賜鈇鉞然後殺賜圭瓉然後為鬯經禮補逸卷八
