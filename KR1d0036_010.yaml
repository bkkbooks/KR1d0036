body:
  text: 經禮補逸附録修史還鄉闗寧國府准太平府闗該承准應天府牒文承奉尚書禮部符文欽奉聖㫖置局編修元史己行纂成洪武二年八月十一日左丞相宣國公上表進呈御覧過欽奉聖㫖編史儒士一十六名各與兩表裏銀三十二兩除存留外老病的送還鄉里欽此欽遵外數内儒士汪克寛等六名元係徽州紹興等府請到儒士擬合欽依送還鄉里為此省部除將各人元闗號色繳回兵部外仰欽依聖㫖事意即便應付船隻逓送還鄉仍行移前路官司一體應付遇陸路應付脚力接送無得失誤遲滯奉此當府除己應付外牒可依上應付順便船隻逓送還鄉仍行移前路官司一體應付如遇陸路一體應付按送施行毋得違誤䝉此當府除己應付外闗請依上應付施行准此當府除己應付外合行移闗請照騐煩為依上應付順便船隻接送施行如遇陸路應付脚力接送請勿遲滯須至闗者右闗徽州府環谷汪先生行状先生諱克寛字徳輔一字仲裕汪其姓也上世自歙縣之黄墩遷于祁門縣北之石山至諱釗徒居縣南之韓溪五𫝊有兄弟七人並有才名其第五子世容生深深生敏敏生黻黻生二子長若思無子以弟若谷子僑為嗣僑補試中國學進士生曄曄生燦字明天繼家學時羣從昆弟為諸經講師學問文章榘範鄉邑從弟國學進士東山府君華字榮夫嘗與其族兄二敎府君相字魏大學于雙峯饒子之門饒乃勉齋先生黄文肅公髙第弟子二敎及東山問難扣懇悉得其藴奥祁邑理學之盛自二公發之東山蚤嵗又嘗從學鄱陽廬䆫趙先生介如與故中書右丞五峯先生燕公楠為同門至元初燕公僉江浙行中書省事道過祁門訪求東山與論舊故將薦諸朝東山固辭明夫無子東山有五子稔聞家庭之學明夫夫人王氏請其第三子應新字元美為嗣是為中山處士記識博洽議論慷慨嘗著便民二十條力陳當世要務欲上之䑓省不果聞者惜之處士娶同邑貢士石溪先生康鼎實第二女生五子次四是為先生大徳八年甲辰正月八日日初出先生生于桃墅里第生而有異處士君謂康夫人曰吾祖考積善隂徳多矣或者食報於是兒興吾宗乎甫六嵗石溪敎之孝經論語孟子隨口成誦日記數百言後二年冬石溪謂處士君曰吾老矣不及敎訓諸外孫汝第四子骨相非凡冝擇師善敎之自是先生從郷先生學毎屈其師日益月異至十嵗處士君見先生所學彌進因取東山問學于饒先生講授之書及當時問荅之言與先生觀㺬遂於理學寖悟乃取朱子四書自定句讀晝夜誦讀恍然知為學之要專勤異於儔輩或逹旦不寢母夫人見先生勤苦太甚謂處士君曰是兒讀書過勤脫或因是致疾不可不戒處士君呼先生諭之曰讀書以養氣為主不冝過勞先生曰某自樂此不為勞也自是讀六經諸子歴代史通鑑綱目等書悉皆成誦延祐四年丁巳先生年十有四嵗是秋鄉里𫝊録江浙秋試三場題目先生一見揮筆成篇鄉先生驚異曰此天才也明年戊午郡守禮羅婺源道一書院山長雲峯胡先生炳文於郡庠開堂試以激厲後進先生屢中郡學及堂試與庠序諸老成相頡頏矣至壬戌春處士君同先生往饒之浮梁拜可堂吳先生仲迂于州學吳先生謂諸門人曰新安汪克寛逺来從逰頴異絶倫勇於為學他日必有所成及以為文印可於吳先生曰讀書明理理蘄體諸身文章異時可不學而能也先生既得吳先生之訓遂篤志聖賢之學既歸葺故廬闢書齋于居室之東偏扁曰思復銘于齋壁以自勵焉次年吳先生講道武林勉先生充貢先生答以吾斯之未能信躐等謀進某何敢然至泰定丙寅春聞嚴陵吳先生朝陽以春秋登甲子進士第任番陽丞特往訪之朝陽先生聞其言喜曰子可謂真知作春秋之心法矣是秋邑長令聞先生學行邁異時輩舉應江浙鄉試即中前列次年春先生至京㑹試論春秋與主司不合又兼對䇿切直遂見黜于中書先生欣然南歸遂奉養之志時貢待制師㤗曰徳輔年妙而質純才優而學博賈勇秋闈即中髙等上之春官輙不偶於主司是得之於數千人之中而失之於數千人之外天道之無常也先生歸自京師刻勵為學痛自修飭遂厭科舉之文慨然曰道不行於當時矣乃取聖人手筆之春秋博考諸說之同異得失以胡文定公之𫝊為主而研究衆說㑹萃成書名之曰春秋經傳附録疏疏翰林學士虞公序行於世易有程朱𫝊義音考詩有集𫝊音義㑹通禮有經禮補逸綱目有凡列考異其餘論著未可枚舉先生於經史聖賢之言心融神㑹造詣深劇故為文畧不經意而渾融典雅其敎學者誘掖奨勸無不成人後以經學敎授宣歙閒數與師山先生鄭公講理論學意氣相得尚書巢深先生汪公謝事家居因遣其孫世賢執經先生之門四方學者知先生道學之懿從遊甚衆先生嘗語學者曰聖賢之學以躬行踐履操存省察為先至於文章特其餘事鰲峯玉署諸老交欲以文章舉薦而先生篤志著述不以一毫利禄動其心諸從學者以先生所居山谷圜遶稱曰環谷四方學者皆曰環谷先生仍至元戊寅五月居室災先生夜半奉處士君遷於别室以居奉養備至是年九月處士君以疾卒先生哀毁踰禮至正壬辰蘄黄兵至先生率長㓜避兵深山所居房舍資財為賊焚掠殆盡簞瓢屢空先生晏如也自是連歲兵戈擾攘至聖朝戡定祸亂先生始返故廬洪武三年正月朝廷命行人賷幣禮聘先生至京同翰林潛溪宋公刪修元史是年九月事畢特㫖一班俱留禄仕先生以老疾力辭不受乃命禮部設晏賜白金三十兩采段二表裏給驛而還先生抵家以洪武五年壬子十有一月十二日卒年六十有九先生平居嘗語二子曰吾殁則祔于盛材之先塋其孤遂以是年某月日塟於其所遵治命也娶同邑聘君和溪先生程公之女勤儉以相成其家業程夫人生與先生同年卒於先生前十九年癸巳五月八日子男二人曰希曰偕女二人長適同邑李傑夫蚤卒次適同里謝子原子原卒而守節誓終其身孫男六人銈鐔錠鉞鏵鏕國英蚤歲從學於先生訓廸最深辱知於先生最厚敬述其梗槩于右俾其孤乞銘於當世之名公以圖不朽焉門人長洲縣學教諭歙人吳國英撰請春秋胡𫝊纂疏刋行啓劉錦文弱水蓬萊凝睇一方之隔泰山北斗馳心千里之瞻輒慿尺素之恭敷布寸丹之瀆恭惟尊先生學通經𫝊道貫古今明聖人筆削之書述而不作剖賢者異同之說展也大成推為人之盛心立垂世之大訓無附㑹紏纒之失重文彩於奎章極根究取舍之嚴副衮襃於華族尚書汪公澤民有序快四方之先覩續千載之不𫝊得儁棘闈乆報飛鈴之㨗欲𫝊梓本幸毋韞玉之藏倘沐允從無任感激俾麟史昭然義見功必有歸將鳩工倐爾書成信焉可失謹此申覆尚冀丙融環谷精舍募助刋書疏切見環谷先生所著書籍惟春秋纂疏及春秋考異刋于閩坊綱目考異始刋於萬川任氏書塾今刋於祁庠矣其餘如周易𫝊義音考二十六卷詩𫝊音義㑹通三十卷四書音證十卷俱有益後學無力刋行上干好義君子樂助金榖共成勝事者伏以立言垂訓實裨益於前修考𫝊釋經尤有功於後學伏惟環谷先生性資明敏學問淵源蚤中省闈破天荒於前代晚登史館賜雲錦於本朝理學冠於諸儒文聲揚於四海著書數百卷昭若發盲立論幾萬言判然解惑顧書肆刋行之未竟而學徒鈔録之尤艱第思獨力以難成惟冀衆輕而易舉欲資好善必遂成功謹干學士大夫普及賢豪俊傑冀捐金而勸相將繡木以鐫雕大書特書請著此時之芳字寡助多助俱留他日之嘉名各發肯心共完勝事不日良工㑹集千年善本流傳天夀斯文與山川而悠久人介景福畀子姓之聦明拱手告聞㸃頭允可謹咨
