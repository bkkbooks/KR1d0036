body:
  text: 經禮補逸卷二元汪克寬撰吉禮祠禮大宗伯以祠春享先王司尊彞春祠夏禴祼用雞彝鳥彞皆有舟其朝踐用兩獻尊其再獻用兩象尊皆有罍籩人凡祭祀共其籩薦修之實牧人凡時祀之牲必用牷物詩天保禴祠蒸嘗于公先王愚案春祠夏禴秋嘗冬蒸此周制時饗之定名也詩云禴祠蒸嘗蓋取詠歌以叶韻耳其實非有異也春秋昭公十五年二月癸酉有事于武宫愚案周官祠禴蒸嘗為四時之祭左氏傳曰禘于武宫是以禘為四時之祭蓋見經書禘于莊公遂例以為禘而誤耳考之王制春曰礿夏曰禘此蓋夏殷之祭名與周不同蓋周更時祭之名而後禘為大祭也然有事武宫乃春祠之祭曷不以祠祭之名書而止曰有事蓋祭之日叔弓涖事籥入而卒去樂卒事雖祭得時而不成乎禮春秋乃變文而書之以著其失也禴禮大宗伯以禴夏享先王司尊彞春祠夏禴祼用雞彞鳥彞皆有舟其朝踐用兩獻尊其再獻用兩象尊皆有罍王制天子犆礿詩禴祠蒸嘗易既濟九五東鄰殺牛不如西鄰之禴祭嘗禮大宗伯以嘗秋享先生司尊彞秋嘗冬蒸祼用􅕌彞黃彞皆有舟其朝獻用兩著尊其饋獻用兩壺尊皆有罍肆師嘗之日涖卜來嵗之芟詩烈祖顧豫蒸嘗湯孫之將閟宫秋而載嘗春秋桓公十四年八月壬申御廩災乙亥嘗愚案嘗以物成而薦新故曰嘗周之八月乃夏六月物未大成嘗非時也况御廩壬申災嘗以乙亥距四日間乃汲汲以災餘共粢盛是有合於周官祭享前期十日帥執事而卜日誓戒之禮乎春秋書之志不敬也左氏傳凡祀始殺而嘗襄公二十八年十一月乙亥嘗于大公之廟慶舍涖事麻嬰為尸慶為上獻蒸禮大宗伯以蒸冬享先王大司馬中冬教大閲獻禽以享蒸司尊彞秋嘗冬蒸祼用斚彜黃彜皆有舟其朝獻用兩著尊其饋獻用兩壺尊皆有罍書洛誥戊辰王在新邑蒸祭嵗文王騂牛一武王騂牛一王入太室祼在十有二月愚案祼灌也灌必用秬鬯者以秬米為酒名秬鬯酒人掌之凡祭祀共酒以往將祭則蒸鬱和之乃名鬱鬯取其香芬隂達以降神也在十有二月以戊辰祭日在是月也春秋桓公八年春正月己卯蒸夏五月丁丑蒸左氏傳閉蟄而蒸愚案周官祠禴嘗蒸為四時之祭是已考之春秋嘗祭不書書必有譏如桓公八年春夏兩以蒸書者譏其不時而且黷如桓公十四年八月嘗本得其時蓋因其壬申御廩災越四日乙亥嘗譏以災餘之粟祭為不敬也如昭十五年春二月有事于武宫蓋春祠也如宣八年夏六月有事于太廟即夏禴也祭得其時於祭無譏故不書名止云有事所以書者一則譏宣公以仲遂之喪猶繹而萬入去籥是忘大臣之哀一則譏昭公以叔弓之喪籥入而去樂卒事是殺宗廟之禮其取義各有所重也祫祠禮曾子問祫祭於祖則祝迎四廟之主主出廟入廟必蹕四廟謂迎髙曽祖禰入太祖之廟也祫禴禮曽子問祫祭於祖則祝迎四廟之主春秋宣公八年六月辛巳有事于太廟王氏曰當是禴祭祫嘗禮王制天子祫嘗諸侯嘗祫春秋文公二年八月丁卯大事于太廟躋僖公榖梁傳曰著祫嘗愚案春秋時祭則書有事如有事于太廟有事于武宫之類是也祫祭則書大事如此書大事于太廟是也蓋時祭之祫則祝迎四廟之主合食於太祖之廟而毁廟之主不與及三年大祫則毁廟之主亦與焉榖梁以大事為祫嘗左氏外傳又以為祫蒸苟以大事為時祫則大祫屬之有事可乎書法曰有曰大其别時祫大祫之義明矣祫蒸禮王制天子祫蒸諸侯蒸祫愚案蒸衆也以冬月時物畢成薦修豐備故曰蒸祫合也天子於此時升羣廟之主合食於大祖之廟故曰祫蒸謂時祫也諸侯降於天子止於秋冬成物之時得合祭焉不得如天子之時祫故曰蒸祫皆變文以明禮制之辨也天子大禘禮大宗伯以肆獻祼饗先王玉人之事祼圭尺有二寸有瓚以祀廟大宗伯享大鬼帥執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齍詔大號大司徒祀五帝奉牛牲羞其肆饗先王亦如之充人掌繫祭祀之牲牷祀五帝則繫于牢芻之三月享先王亦如之內饔凡宗廟之祭祀掌割烹之事鼓人以路鼓鼓鬼享大司樂乃奏無射歌夾鍾舞大武以饗先祖大傳禮不王不禘王者禘其祖之所自出以其祖配之儀禮喪服傳諸侯及其太祖天子及其祖之所自出祭法有虞氏禘黃帝而郊嚳祖顓頊而宗堯夏后氏禘黃帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王愚案有虞氏禘黃帝而郊嚳夏后氏禘黃帝而郊鯀其祀同乎曰鯀與嚳不同也曷為不同曰鯀夏后氏之父也夏后氏之天下受於舜非受於鯀也鯀治水九載績用弗成舜殛之羽山非舜殛之也明天刑以討之天下之至公也鯀服舜刑則為天下之罪人矣禹既受舜禪而升罪人以配天其可以天下私其父而同嚳之祀哉夫大事于太廟躋僖公春秋尚譏其逆祀則禹之私其父而逆于舜且不逆于天乎天其弗享夏后氏之郊矣曰然則禹之于鯀也如之何曰廟以祭之禮也何必郊雖然禹聖人也而豈為是哉祭法之言蓋以厯序數聖人郊禘之禮遂例及焉不足信也讀者察焉明堂位季夏六月以禘禮祀周公于太廟牲用白牡尊用犧象山罍鬱尊用黃目灌用玉瓚大圭薦用玉豆雕纂損管反爵用玉盞仍雕加以璧散璧角俎用梡嶡欹升歌清廟下而管象朱干玉戚冕而舞大武皮辨素積裼而舞大夏孟獻子曰七月日至可以有事于祖七月之禘獻子為之也玉藻大享其王事與平聲三牲魚臘四海九州之美味也籩豆之薦四時之和氣也內金示和也束帛加璧尊德也龜為前列先知也金次之見情也丹漆絲纊竹箭與衆共財也其餘無常貨各以國之所有則致逺物也其出也肆夏而送之蓋重禮也禮運禮行於祖廟而孝慈服焉詩頌長發大禘而歌𤣥王桓撥相土烈烈上帝是祗帝命式于九圍大祫禮大宗伯以肆獻祼饗先王曾子問祫祭於祖則祝迎四廟之主春秋文公十一年公羊傳祫祭毁廟之主陳于太祖未毁廟之主皆升合食于大祖五年而再殷祭禮器大饗腥三獻爓濳一獻孰諸侯大祫禮大𫝊禮諸侯大事及其大祖大夫士有大事省於其君干祫及其髙祖案大祖受命君也大事冦戎之事也省善也善於其君謂免於大難也干猶空也空祫謂無廟祫祭之於壇墠春秋文二年八月丁卯大事于大廟躋僖公榖梁傳祫祭者毁廟之主陳于大祖未毁廟之主皆升合祭于大祖范氏注祫祭者皆合祭諸廟已毁未毁者之主於大祖廟中以昭穆為次序父為昭子為穆太祖東向昭南向穆北向孫從王父坐也祭畢則復還其廟何氏注昭取其向明穆取其北面尚敬饗先妣禮大司樂乃奏夷則歌小吕舞大濩以享先妣愚案後世帝王其始祖之配自配饗於始祖則無此廟立廟自后稷為始祖姜嫄無所始是以特立廟而祭之先妣姜嫄也姜嫄履大人跡而生后稷是周之先母也繹禮禮器曰為祊乎外郊特牲曰繹之於庫門內書髙宗肜日愚案肜祭明日又祭之名也殷曰肜周曰繹名不同而復祭之禮同也詩鳧鷖篇鳧鷖在涇公尸來燕來寧朱子𫝊祭之明日繹而賔尸之樂假樂篇之綱之紀燕及朋友朱子𫝊公尸所以答鳧鷖春秋宣公八年壬午猶繹萬入去籥薦寢廟禮月令仲春天子乃鮮羔開氷先薦寢廟季春薦鮪于寢廟孟夏以彘嘗麥先薦寢廟孟秋嘗新先薦寢廟仲秋以犬嘗麻先薦寢廟季秋以犬嘗稻先薦寢廟季冬嘗魚先薦寢廟詩濳之篇有鱣有鮪鰷鱨鰋鯉以享以祀以介景福天子遷廟禮春秋文公二年榖梁傳作主壞廟有時日於練焉壞廟壞廟之道易檐可也改塗可也禮以次行遷廟事畢請就燕君出廟門卿大夫有司執事者皆出廟門告事畢乃曰擇日而祭焉愚案檀弓殷既練而祔周卒哭而祔孔子善殷左氏謂君薨卒哭而祔祔而作主榖梁謂吉主於祔練於練焉壞廟則待練而始祔二氏之說於殷周之制各有合然禮既葬作主於墓而反虞孝子皇皇不忍一日忘其親也苟卒哭而易主遷廟遽用吉祭孝子豈忍急於鬼其親乎胡氏取榖梁祔練之說蓋以其合殷而孔子善之為得禮之本也諸侯遷廟禮大戴禮成廟將遷之新廟君前徙三日齊祝宗人及從者皆齊徙之日君𤣥服從者皆𤣥服從至于廟羣臣如朝禮位君入立於阼階下西向有司如朝位宗人擯舉手曰有司其請升君升祝奉幣從在左北面再拜興祝聲三曰孝嗣侯某敢以嘉幣告于皇考某侯成廟將徙敢告君及祝再拜興祝曰請導君降立於階下奉衣服者皆奉以從祝奉衣服者降堂君及在位者皆辟也奉衣服者至碑君從有司皆以次從出廟門奉衣服者升車乃步君升車從者皆就車也凡出入門及大溝渠祝下擯至于新廟筵于户牖間尊于四序下脯醢陳于房中設洗當東榮南北以堂深有司皆先入如朝位祝導奉衣服者乃入君從奉衣服者入門左在位者皆避也奉衣服者升堂皆反位君從升奠衣服于席上祝奠幣于几東君北向祝在左贊者盥升適房薦脯醢君盥酌奠于薦西反位君及祀再拜興祝聲三曰孝嗣侯某敢用嘉幣告于皇考某侯今月吉日可以徙于新廟敢告再拜君就東箱西面祝從西箱東面在位者皆反走辟如食間祝請反位君反位祝從在左卿大夫及衆有司諸在位者皆反位再拜畢事愚案諸侯廟制二昭二穆與大祖而為伍也本諸祭法曰考廟曰王考廟曰皇考廟則皆月祭之曰顯考廟曰祖考廟則不得月祭唯四時祭之而已若高祖之父其廟既毁藏主于祖考之廟中若有祈禱則出受壇祭而不得四時之祭矣至髙祖之祖其主亦藏祖考廟中若有祈禱則出受墠祭而又不得在壇之祭矣逮夫去墠而為鬼者雖有祈禱而祭亦不及焉蓋以親過髙祖則毁廟而迭遷之禮也是故武宫之立春秋譏之則凡親盡不毁者皆無合於先王祭法之正也釁廟禮雜記成廟則釁之雞人凡祭祀面禳釁共其雞牲祝宗人宰夫饔人皆爵辨純衣饔人拭羊宗人祝之宰夫北面于碑南東上饔人舉羊升屋自中中屋南面刲羊血流于前乃降門夾室皆用雞先門而後夾室其衈皆於屋下割雞門南門夾室中室有司皆向室而立門則有司當門北面既事宗人告事畢乃皆退反命于君曰釁某廟事畢反命於寢君南嚮于門內朝服既反命乃退凡宗廟之器其名者成則釁之以豭豚宗廟禮玉藻宗廟之祭仁之至也曽子問曰宗子為士庶子為大夫其祭也如之何孔子曰以上牲祭於宗子之家祝曰孝子某為介子某薦其常事若宗子有罪居于他國庶子為大夫其祭也祝曰孝子某使介子某執其常事攝主不厭祭不旅不假不綏祭不配布奠於賔賔奠而不舉不歸肉其辭于賔曰宗兄宗弟宗子在他國使某辭曾子問曰宗子去在他國庶子無爵而居者可以祭乎孔子曰祭哉請問其祭如之何孔子曰望墓而為壇以時祭若宗子死告於墓而後祭於家宗子死稱名不言孝孝經為之宗廟以鬼享之大司樂乃分樂而序之凡樂黃鍾為宫大吕為角大蔟為徴應鍾為羽路鼓路鼗隂竹之管龍門之琴瑟九德之歌九㲈之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣周易萃王假有廟用大牲吉祭統夫祭也者必夫婦親之愚案宗廟之祭君牽牲夫人薦盎君割牲夫人薦酒此皆夫婦親之之禮也所以然者夫婦足以盡隂陽之義而一氣感通之誠無間於顯微則愛敬之心亦與之無間於存殁故僾然見乎其位肅然聞乎其容聲此鬼神之常理也不可度思矧可射思夫安得不敬乎此又交神明奉祭祀之本也齊禮祭統致齊於內散齊於外齊之日思其居處思其笑語思其志意思其所樂思其所嗜齊三日乃見其所為齊者膳夫王齊日三舉玉府王齊則共玉食鬯人凡王之齊事共其秬鬯禮器魯人將有事於上帝必先有事於頖宫晉人將有事於河必先有事於惡呼池徒河反齊人將有事於泰山必先有事於配林七日戒三日宿慎之至也祭統及時將祭君子乃齊散齊七日致齊三日是故君子非有大事也非有恭敬也則不齊愚案虞書之稱堯曰欽明又曰允恭大雅之述文王曰於緝熙敬止又曰不顯亦臨無射亦保孔子之語仲弓曰出門如見大賔使民如承大祭是則君子之所以為德者恭敬而已矣恭敬也者不可須㬰離也可離不足以語君子也祭統曰君子非有大事也非有恭敬也則不齊何也蓋君子之存乎恭敬固不待於齊也齊則所以篤其恭敬而致其誠也謂之非有大故則不齊猶可也謂之非有恭敬則不齊其說之陷而不可舉也甚矣信斯言也是則恭敬僅存於齊之時不齊之時則不恭敬矣果可以語君子之道乎大抵漢儒記禮之言往往騁于文而昧于理其言之類此者不絶于編也在學者考而擇焉斯得矣禮尸禮禮器周坐尸詔侑武無方夏立尸而卒祭殷坐尸周旅酬六尸郊特牲舉斚角詔妥尸古者尸無事則立有事而後坐也尸神象也守祧掌其遺衣服若將祭祀則各以其服授尸旅酬禮曾子問曰祭如之何則不行旅酬之事矣孔子曰聞之小祥者主人練祭而不旅奠酬於賓賓弗舉禮也昔者魯昭公練而舉酬行旅非禮也孝公大祥奠酬弗舉亦非禮也案朱子謂旅衆也酬導飲也旅酬之禮賓弟子兄弟之子各舉觶於其長而衆相酬蓋宗廟之中以有事為榮故逮及賤者使亦得以伸其敬也經禮補逸卷二
