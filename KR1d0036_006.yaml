body:
  text: 經禮補逸卷六元汪克寬撰凶禮凶荒禮大司徒以荒政十有二聚萬民一曰散利二曰薄征三曰緩刑四曰弛力五曰舍禁六曰去幾七曰眚禮八曰殺哀九曰蕃樂十曰多昏十有一曰索鬼神十有二曰除盜賊士師若邦凶荒則以荒辨之法治之令移民通財糾守緩刑朝士若邦凶荒則令邦國都家縣鄙慮刑貶遺人掌縣都之委積以待凶荒小宰以法掌朝覲會同賔客之戒具喪荒亦如之令百官府共其財用喪荒受其含襚幣玉之事膳夫大荒則不舉司服大荒素服大司樂大荒令弛縣典瑞珍圭以恤凶荒小行人若國凶荒則令賙委之廩人掌九穀之數若食不能人二釜則令邦移民就穀詔王殺邦用掌客凡禮賔客凶荒殺禮司市國凶荒則市無征凡以神仕者以禬國之凶荒曲禮嵗凶年穀不登君膳不祭肺馬不食穀馳道不除祭事不縣大夫不食粱士飲酒不樂玉藻年不順成君衣布搢本關梁不租山澤列而不賦土工不興大夫不得造車馬春秋傳襄公二十四年大祲之禮君食不兼味臺榭不塗弛候廷道不除百官布而不制鬼神禱而不祀此大祲之禮也王制祭凶年不儉愚案祭禮豐年不奢凶年不儉此記禮者之言也孔子又曰凶年祀以下牲不同何哉蓋先王之祀制用有常不以嵗之豐凶而易其禮此禮之循乎經也祀以下牲如凶年君膳則不舉服則布素樂則弛縣賔客則殺禮而以常祭之牲遞降而用者此又禮之通乎變也然嵗有豐凶而禮無奢儉牲有降用而禮無貶損是則未嘗不同也大札禮大司徒大札則令邦國移民通財舍禁弛力薄征緩刑朝士若札喪則令邦國都家縣鄙慮刑貶膳夫大札則不舉司服大札素服大司樂大札令弛縣司市國札喪則市無征掌客凡禮賔客札喪殺禮凡以神仕者以禬民之札喪小行人若國札喪則令賻補之均人凶札則無力政無財賦告飢禮春秋左傳隱公六年京師來告飢請糴禮春秋左傳隱公六年京師來告飢公為之請糴於宋衛齊鄭禮也莊公二十八年臧孫辰告糴于齊僖公十三年晉荐飢使乞糴于秦秦輸粟于晉歸粟禮春秋僖公十三年晉荐飢乞糴于秦秦輸粟于晉十五年晉又飢秦又餼之粟定公五年夏歸粟于蔡以周亟矜無資大災禮膳夫大災則不舉司服大災素服大司樂大災令弛縣掌客凡禮賔客禍災殺禮小宗伯大災及執事禱祠于上下神祇司巫國有大災則帥巫而造巫恆女巫凡邦之大災歌哭而請春秋左傳襄公九年宋災二師令四鄉正敬饗祝宗用馬于四墉祀盤庚于西門之外昭公十八年五月壬午宋衛陳鄭皆大災作鄭子産辭晉公子公孫于東門使司寇出新客禁舊客勿出於宫使子寬子上巡羣屏攝至于大宫使公孫登徙大龜使祝史徙主祏於周廟告于先君使府人庫人各警其事商成公警司宫出舊宫人置諸火所不及司馬司寇列居火道行火所焮城下之人伍列登城明日使野司寇各保其徴郊人助祝史除於國北禳火于玄冥回祿祈于四鄘書焚室而寬其征與之材三日哭國不市使行人告於諸侯宋衛皆如是哀公三年五月辛卯司鐸火火踰公宫桓僖災救火者皆曰顧府南宫敬叔至命周人出御書俟於宫曰庀汝而不在死子服景伯至命宰人出禮書以待命命不共有常刑校人乘馬巾車脂轄百官官備府庫慎守宫人肅給濟濡帷幕鬱攸從之蒙葺公屋自大廟始外內以悛助所不給有不用命則有常刑無赦公父文伯至命校人駕乘車季桓子至御公立于象魏之外命救火者傷人則止穀梁傳成公五年梁山崩壅河三日不流晉召伯尊伯尊曰君親素縞帥羣臣而哭之既而祠焉斯流矣左傳山崩川竭君為之不舉降服乘縵徹出次祝幣史辭而禮焉弔災禮小行人若國有災則令哀弔之春秋左傳宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱莊公十一年宋大災襄公三十年宋災叔孫豹會晉趙武齊公孫蠆宋向戍衛北宫他鄭罕虎及小邾之大夫會于澶淵為宋災故以謀歸宋昭十八年許不弔災君子知許之先亡也雜記廄焚孔子拜鄉人為火來者拜之士一大夫再亦相弔之道也致禬禮大宗伯以禬禮哀圍敗大行人致禬以補諸侯之災小行人若國師役則令稿禬之春秋左傳昭公六年叔弓如楚聘且弔敗也哀公十五年楚子西子期伐吳陳侯使公孫貞子弔焉吳子使太宰嚭勞哀公二十年越圍吳趙孟降於喪食使楚隆告于吳王曰寡君之老無恤使陪臣隆敢展謝其不共黃池之役君之先臣志父得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之王拜稽首曰寡人不佞不能事越以為大夫憂拜命之辱與之一簞珠使問趙孟曰句踐將生憂寡人寡人死之不得矣王曰溺人必笑吾將有問也史黯何以得為君子對曰黯也進不見惡退無謗言王曰宜哉僖公三十三年公如齊朝且弔有狄師也恤禮大宗伯以恤禮哀寇亂春秋左傳昭公二十一年宋華亥向寧華定自陳入于宋南里以叛二十二年薳越使告于宋曰寡君聞君有不令之臣為君憂無寧以為宗羞寡君請受而戮之對曰孤不佞不能媚其父兄以為君憂拜命之辱襄公十四年衛獻公使子蟜子伯子皮與孫子盟于丘宫孫子皆殺之公如鄄使子行於孫子孫子又殺之公出奔齊孫氏追之敗公徒於阿澤公使厚成叔弔于衛曰寡君使瘠聞君不撫社稷而越在他竟若之何不弔以同盟之故使瘠敢私于執事曰有君不弔有臣不敏君不赦宥臣亦不帥職增淫發泄其若之何衛人使大叔儀對曰羣臣不佞得罪於寡君寡君不以即刑而悼棄之以為君憂君不忘先君之好辱弔羣臣又重恤之敢拜君命之辱重拜大貺唁禮詩載馳歸唁衛侯春秋穀梁傳弔失國曰唁公羊傳弔亡國曰唁弔失國曰弔昭公二十五年公孫于齊次于陽州齊侯唁公于野井二十九年公至自乾侯居于鄆齊侯使髙張來唁公三十一年晉侯使荀躒唁公于乾侯公羊傳昭公二十五年公孫于齊齊侯唁公于野井曰奈何君去魯國之社稷昭公曰喪人不佞失守魯國之社稷執事以羞再拜顙髙子執簞食與四脡脯國子執壺漿曰吾寡君聞君在外餕饔未就敢致糗於從者昭公曰君不忘吾先君延及喪人錫之以大禮載拜稽首以衽受髙子曰有夫不祥君無所辱大禮昭公蓋祭而不嘗景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用敢以請昭公曰喪人不佞失守魯國之社稷執事以羞敢辱大禮敢辭景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用敢固以請昭公曰以吾宗廟之在魯也有先君之服未之能以服有先君之器未之能以出敢固辭景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用請以饗乎從者昭公曰喪人其何稱景公曰孰君而無稱昭公於是噭然而哭諸大夫皆哭既哭以遇禮相見孔子曰其禮與其辭足觀矣經禮補逸卷六
