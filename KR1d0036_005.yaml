body:
  text: 經禮補逸卷五元汪克寬撰凶禮大喪禮周禮大宰大喪贊贈玉含玉典瑞大喪共飯玉含玉贈玉小宰以法掌朝覲㑹同賓客之戒具喪荒亦如之令百官府共其財用喪荒受其含禭幣玉之事宰夫大喪小喪掌小官之戒命帥執事而治之膳夫大喪則不舉宫正大喪則授廬舍辨其親疏貴賤之居庖人共喪紀之庶羞甸師喪事代王受眚烖獸人凡喪紀共其死獸生獸獻人凡喪紀共其魚之鮮薧臘人喪紀共其脯臘凡乾肉之事凌人大喪共夷槃氷囿人喪紀共其生獸死獸之物幕人大喪共其帷幕帟綬掌次凡喪王則張帟三重司裘大喪廞裘飾皮車外府凡喪紀共其財用之幣齎內豎凡喪事佐后使治外內命婦正其服位內小臣喪紀則擯詔后之禮事相九嬪之禮事正內人之禮事閽人喪紀之事設門燎蹕宫門廟門寺人若喪紀則帥女宫而致於有司佐世婦治禮事掌內人之禁令內竪若喪紀之事則為內人蹕九嬪若有賓客則從后大喪帥叙哭者亦如之女御大喪掌沐浴夏采掌大喪以冕服復于大祖以乘車建綏復于四郊玉府大喪共含玉復衣裳角枕角柶典絲喪紀共其絲纊組文之物大司徒大喪帥六卿之衆庶屬其六引而治其政令若國有大故則致萬民於玉門小司徒大喪帥邦役治其政教鄉師大喪用役則帥其民而至遂治之及葬執纛以與匠師御匶而治役及窆執斧以涖匠師族共喪器鄉共吉凶禮樂之器鄉大夫國有大故則令民各守其閭以待政令封人喪紀則飾其牛牲鼓人大喪則詔大僕鼓牛人喪事共其奠牛遂人大喪帥六遂之役而致之掌其政令及葬帥而屬六綍及窆陳役遂師大喪使帥其屬以帷帟先道野役及窆抱磨共丘籠及蜃車之役酇長喪紀之事若作其民而用之則以旗鼓兵革帥而至稍人大喪帥蜃車與其役以至掌其政令以聽於司徒舍人喪紀共飯米熬榖大宗伯朝覲㑹同則為上相大喪亦如之小宗伯王崩大肆以秬鬯渳及執事涖大斂小斂帥異族而佐縣衰冠之式于路門之外及執事視葬獻器遂哭之卜葬兆甫竁亦如之既葬詔相喪祭之禮成葬而祭墓為位肆師大喪大渳以鬯則築煮令外內命婦序哭鬱人大喪之瀰共其肆器及葬共其祼器遂貍之鬯人大喪之大渳設斗共其釁鬯司尊彝大喪存奠彞天府凡國之玉鎮大寶器藏焉若有大喪則出而陳之既事藏之司服為天王斬衰大喪共其復衣服斂衣服奠衣服廞衣服皆掌其陳序世婦大喪比外內命婦之朝奠哭不敬者而苛罰之內宗大喪序哭者外宗大喪則序外內朝莫哭者冢人大喪既有日請度甫竁遂為之尸及竁以度為丘隧共喪之窆器及葬言鸞車象人及窆執斧以涖遂入藏凶器大司樂大喪涖廞樂器及葬藏樂器亦如之大師大喪帥瞽而廞作匶諡小師大喪與廞視瞭大喪廞樂器笙師大喪廞其樂器及葬奉而藏之鎛師大喪廞其樂器奉而藏之籥師大喪廞其樂器奉而藏之典庸器大喪廞筍簴司干大喪廞舞器及葬奉而藏之大祝大喪始崩以肆鬯渳尸相飯贊斂徹奠小祝大喪贊渳設熬置銘及葬設道齎之奠分禱五祀喪祝掌大喪勸防之事及辟令啓及朝御匶乃奠及祖飾棺乃載遂御及葬御匶出宫乃代及壙說載除飾大史大喪執法以涖勸防小史大喪佐大史凡國事之用禮法者掌其小事巾車大喪飾遣車及葬執蓋從車持旌及墓呼啓關陳車典路大喪則出路贊駕說車僕大喪廞革車司常大喪共銘旌建嶔車之旌及葬亦如之大司馬大喪平士大夫喪祭射人大喪與僕人遷尸委人喪紀共其薪蒸木材諸子大喪正羣子之服位虎賁氏大喪守王門及葬從遣車而哭方相氏掌蒙熊皮黃金四目𤣥衣朱裳執戈揚盾大喪先匶及墓入壙以戈擊四隅歐方良大僕大喪始崩戒鼓𫝊達于四方窆亦如之祭僕大喪復于小廟御僕大喪持翣𨽻僕大喪復于小寢大寢司兵大喪廞五兵司弓矢大喪共明弓矢校人大喪飾遣車之馬及葬埋之澤虞喪紀共其葦蒲之事稻人喪紀共其葦事大司寇大喪前王士師大喪則帥其屬而蹕于王宫大行人若有大喪則詔相諸侯之禮鄉士大喪則各掌其鄉之禁令帥其屬夾道而蹕象胥大喪相國客之禮儀而正其位檀弓哭泣之哀齊衰之情饘粥之食自天子達后喪禮司服凡喪為王后齊衰內司服后之喪共其衣服凡內具之物小宰令百官府共其財用受其含禭幣玉之事內小臣喪紀相九嬪之禮事正內人之禮事寺人若喪紀則帥女宫而致於有司佐世婦治禮事掌內人之禁令舍人喪紀共飯米熬榖庖人共喪紀之庶羞臘人喪紀共其脯臘凡乾肉之事典絲喪紀共其絲壙組文之物女御后之喪持翣小司冦后之喪前王而辟內豎王后之喪遷于宫中則前蹕檀弓穆公之母卒使人問於曾子曰如之何對曰申也聞諸申之父曰哭泣之哀齊斬之情饘粥之食自天子達世子喪禮小司寇凡世子之喪前王而辟職喪禮職喪掌諸侯之喪及卿大夫士凡有爵者之喪以國之喪禮涖其禁令序其事凡其喪祭詔其號治其禮外饔凡小喪紀陳其鼎俎而實之幕人三公及卿大夫之喪共其帟鄉士三公若有邦事則為之前驅而辟其喪亦如之遂士六卿若有邦事則為之前驅而辟其喪亦如之雜記復諸侯以褒衣冕服爵辨服諸侯行而死於館則其服如於其國如於道則升其乘車之左轂以其綏復諸侯飯七貝公七踊公襲卷衣一𤣥端一朝服一素積一纁裳一爵辨二𤣥冕一褒衣一朱緑帶申加大帶於上諸侯五月而葬七月而卒哭升正柩諸侯執紼五百人四綍皆銜枚司馬執鐸左八人右八人匠人執羽葆御柩檀弓哭泣之哀齊斬之情饘粥之食自天子達夫人喪禮雜記復夫人稅彖衣揄搖狄狄稅素沙下大夫以禮衣下大夫謂下大夫之妻也喪大記士妻以稅衣大夫喪禮職喪掌卿大夫士凡有爵者之喪以國之喪禮涖其禁令序其事凡其喪祭詔其號治其禮雜記復下大夫以䄠衣其餘如士大夫士死於道則升其乘車之左轂以其綏復如於館死則其復如於家為君使而死公館復私館不復大夫飯五貝大夫五踊喪大記大夫之喪三日之朝既殯主人主婦室老皆杖雜記大夫之喪大宗人相小宗人命龜卜人作龜大夫之喪其升正柩也執引者三百人執鐸者左右各四人御柩以茅大夫三月而葬五月而卒哭卿大夫之疾君問之無算君於卿大夫比葬不食肉比卒哭不舉樂檀弓公叔文子卒其子戌請諡於君檀弓齊莊公襲莒於奪兊把梁死焉其妻迎其柩於路而哭之哀莊公使人弔之春秋左傳襄公十七年齊晏桓子卒晏嬰粗縗斬苴絰帶杖菅屨食鬻居倚廬寢苫枕草其老曰非大夫之禮也曰唯卿為大夫內子喪禮雜記復內子以鞠衣褒衣素紗復禮曲禮復曰天子復矣檀弓君復於小寢大寢小祖大祖庫門四郊禮運及其死也升屋而號告曰臯某復然後飯腥而苴孰檀弓復盡愛之道也有禱祠之心焉望反諸幽求諸鬼神之道也北面求諸幽之義也喪大記凡復男子稱名婦人稱字復聲必三者禮成於三也唯哭先復復而後行死事承衾哭尸禮喪大記大夫之喪主人坐于東方主婦坐于西方其有命夫命婦則坐無則皆立士之喪主人父兄子姓皆坐于東方主婦姑姊妹子姓皆坐于西方凡哭尸于室者主人二手承衾而哭主喪禮喪大記有無後無無主雜記姑姊妹其夫死而夫黨無兄弟使夫之族人主喪妻之黨雖親勿主夫若無族則前後家東西家無有則里尹主之凡主兄弟之喪雖疏亦虞之沐浴尸禮大祝大喪始崩以肆鬯渳尸小祝贊渳喪大記始死遷尸于牀幠用斂衾去死衣小臣楔齒用角柶綴足用燕几管人汲不說繘屈之盡階不升堂授御者御者入浴小臣四人抗衾御者二人浴浴水用盆沃水用枓浴用絺巾挋用浴衣如他日小臣爪足浴餘水弃于坎其母之喪則內御者抗衾而浴管人汲授御者御者差沐于堂上君沐粱大夫沐稷士沐粱甸人為垼于西墻下陶人出重鬲管人受沐乃煮之甸人取所徹廟之西北厞薪用爨之管人授御者沐乃沐沐用瓦盤挋用巾如他日小臣爪手翦須濡濯棄于坎奠尸禮司服大喪共其奠衣服士喪禮復者降楔齒綴即奠脯醢與酒于尸東愚案檀弓小斂之奠子游曰於東方曽子曰於西方斂斯席矣記禮者正之曰小斂之奠在西方魯禮之末失也又案儀禮小斂奠無席大斂則有奠席在饌北據此則小斂亦并無席矣然小斂之奠設於東方者蓋以萬物生於東而死於北孝子即此設奠依神為未忍死其親之意也襲斂禮司服大喪共其斂衣服皆掌其陳序雜記子羔之襲也繭衣裳與稅衣纁袡為一素端一皮辨一爵辨一𤣥冕一公襲卷衣一𤣥端一朝服一素積一纁裳一爵辨二𤣥冕一褒衣一朱緑帶申加大帶於上君錦冒黼殺綴旁七大夫𤣥冒黼殺綴旁五士緇冒赬殺綴旁三喪大記小斂君錦衾大夫縞衾士緇衾皆一衾十有九稱大斂君陳衣百稱大夫五十稱士三十稱檀弓子思曰凡附於身者必誠必信勿之有悔焉耳矣愚案古之葬者厚衣之以薪葬之中野後世聖人易之以棺槨蓋取諸大過然聖人制為典禮豈直棺槨過於厚哉則凡含禭賵賻之禮衣衾絞襟之具亦必厚稱其制也故古者士襲衣三稱大夫五稱諸侯七稱公九稱小斂尊卑通用十九稱大斂君百稱大夫五十稱士三十稱若孔子之喪公西赤掌殯葬焉襲衣十一稱朝服一雖其襲數不同而所以欲厚庇之者非徒設飾也蓋以死者辟人之惡而凡保附其體者大抵不容疏略也降及後世僅有襲衣而大小斂之禮不行故禭禮亦從而廢彼薄視其親如司馬溫公之議者豈少哉君子有不忍言也然則孝子之心如之何曰稱其有無之實盡其孝敬之誠斯可矣小斂禮大祝大喪贊斂喪祝凡卿大夫之喪掌事而斂喪大記小斂主人即位于户內君以簟席大夫以蒲席士以葦席小斂布絞縮者一橫者三君錦衾大夫縞衾士緇衾皆一衾十有九稱君陳衣于東序大夫士陳衣于房中皆西領北上絞襟不在列主人即位于户內主婦東面乃斂卒斂主人馮之踊主婦亦如之主人袒脫髦括髮以麻婦人髽帶麻于房中徹幃男女奉尸夷于堂降拜檀弓主人既小斂袒括髮曾子曰尸未設飾故帷小斂而徹帷雜記小斂大斂啓皆辨遍拜小斂環絰公大夫士一也大斂禮司服大喪共其斂衣服皆掌其陳序大祝贊斂喪祝凡卿大夫之喪掌事而斂檀弓大斂於阼喪大記大斂布絞縮者三橫者五布襟二衾君大夫士一也君陳衣于庭百稱北領西上大夫陳衣于東序五十稱西領南上士陳衣于序東三十稱西領南上絞襟如朝服絞一幅為三不辟襟五幅無紞君大夫士祭服無算君褶衣褶衾大夫士猶小斂也君將大斂子辨絰即位于序端卿大夫即位于堂亷楹西北面東上父兄堂下北面夫人命婦尸西東面外宗房中南面小臣鋪席商祝鋪絞襟衾衣士盥于盤上士舉遷尸于斂上卒斂宰告子馮之踊夫人東面亦如之雜記公視大斂公升商祝鋪席乃斂大斂皆辨拜殯禮王制天子七日而殯諸侯五日而殯大夫士庶人三日而殯檀弓天子之殯也菆塗龍楯春以椁加斧于槨上畢塗屋喪大記君殯用輴欑至于上畢塗屋大夫殯以幬欑至于西序塗不暨于棺士殯見衽塗上帷之檀弓殯于客位既殯旬而布材與明器雜記朝夕哭不帷訃禮雜記凡訃於其君曰君之臣某死父母妻長子曰君之臣某之某死君訃於他國之君曰寡君不祿敢告于執事夫人曰寡小君不祿太子之喪曰寡君之適子某死大夫訃于同國適者曰某不祿訃于士亦曰某不祿訃於他國之君曰君之外臣寡大夫某死訃於適者曰吾子之外私寡大夫某不祿使某實訃於士亦曰吾子之外私寡大夫某不祿使某實士訃於同國大夫曰某死訃於士亦曰某死訃於他國之君曰君之外臣某死訃於大夫曰吾子之外私某死訃於士亦曰吾子之外私某死弔禮鬯人凡王弔臨共介鬯大僕掌三公孤卿之弔勞內宗凡卿大夫之喪掌其弔臨小臣掌士大夫之弔勞御僕掌庶民之弔勞司巫王弔則與祝前喪祝王弔則與巫前寺人凡內人弔臨于外則帥而往立于其前而詔相之宰夫凡邦之弔事掌其戒令與其幣器財用凡所共者司服凡弔事辨絰服王制諸侯弔於異國之臣則其君為主檀弓君於大夫將葬弔於宫檀弓君遇柩於路必使人弔之檀弓喪公弔之必有拜者雖朋友州里舍人可也雜記弔者即位于門西東面其介在其東南北面西上西於門主孤西面相者受命曰孤某使某請事客曰寡君使某如何不淑相者入告出曰孤某須矣弔者入主人升堂西面弔者升自西階東面致命曰寡君聞君之喪寡君使某如何不淑子拜稽顙弔者降反位春秋左傳襄公二十三年齊侯襲莒莒子伐之獲把梁齊侯歸遇把梁之妻于郊使人弔之辭曰殖之有罪何辱命焉若免於罪則猶有先人之敝廬在下妾不得與郊弔齊侯弔諸其室昭公七年衛襄公卒王使成簡公如衛弔九年王有姻喪晉使趙成如周弔臨禮鬯人凡王弔臨共介鬯大宗伯朝覲㑹同則為上相王哭諸侯亦如之內宗凡卿大夫之喪掌其弔臨寺人凡內人弔臨於外則帥而往立于其前而詔相之雜記上客臨曰寡君有宗廟之事不得承事使一介老某相執綍相者反命曰孤須矣臨者入門右介者皆從之立于其左東上宗人納賓升受命于君降曰孤敢辭吾子之辱請吾子之復位客對曰寡君命某毋敢視賓客敢辭宗人反命曰孤敢固辭吾子之辱請吾子之復位客對曰寡君命某毋敢視賓客敢固辭宗人反命曰孤敢固辭吾子之辱請吾子之復位客對曰寡君命使臣某毋敢視賓客是以敢固辭固辭不獲命敢不敬從客立于門西介立于其左東上孤降自阼階拜之升哭與客拾踊三客出送于門外拜稽顙曲禮入臨不翔檀弓天子之哭諸侯也爵辨絰䊷衣陳莊子死赴於魯魯人欲勿哭繆公召縣子而問焉縣子曰古之大夫束修之問不出竟雖欲哭之安得而哭之今之大夫交政于中國雖欲勿哭焉得而勿哭且臣聞之哭有二道有愛而哭之有畏而哭之公曰然然則如之何而可縣子曰請哭諸異姓之廟於是與哭諸縣氏妻之昆弟為父後者死哭之適室父在哭於妻之室非為父後者哭諸異室有殯聞逺兄弟之喪哭於側室無側室哭于門內之右同國則往哭之春秋左傳襄公十二年吳子夀夢卒臨於周廟禮也凡諸侯之喪異姓臨於外同姓於宗廟同宗於祖廟同族於禰廟是故魯為諸姫臨於周廟為邢凡蔣茅胙祭臨於周公之廟盟于臯鼬鄭子大叔未至而卒趙簡子為之臨甚哀含禮職喪凡國有司以王命有事焉則詔贊主人有事謂含禭贈賵之屬小宰喪荒受其含禭幣玉之事雜記含者執璧將命曰寡君使某含相者入告出曰孤某須矣含者入升堂致命子拜稽顙含者坐委于殯東南有葦席既葬蒲席降出反位宰夫朝服即喪屨升自西階西面坐取璧降自西階以東檀弓邾婁考公之喪徐君使容居來含榖梁𫝊貝玉曰含左傳文公五年王使榮叔來含且賵檀弓飯用米貝弗忍虛也不以食道用美焉耳愚案含者何口實也實者何實以玉食之美也玉食者何天子飯以玉諸侯以珠大夫以碧士以貝庶人以錢是也然則何以實之孝子事死如生不忍虛其親口之意也他日塗車芻靈之制亦猶是不忍之心也夫安得不敬乎考之雜記天子飯九貝諸侯七大夫五士三周禮天子飯含用玉此蓋異代之制不同如此本注謂飯含也是即以飯為含矣參之禮運曰飯腥榖梁氏謂貝玉曰含則二者雖皆為口實而用則不同謂之飯含則可謂之飯含也則不可學者察焉賻賵禮職喪掌諸侯之喪凡國有司以王命有事焉則詔贊主人有事謂贈賵之事雜記上介賵執圭將命曰寡君使某賵相者入告反命曰孤某須矣陳乘黃大路于中庭北輈執圭將命客使自下由路西子拜稽顙坐委于殯東南隅宰舉以東凡將命鄉殯將命子拜稽顙西面而坐委之宰舉璧與圭宰夫舉禭升自西階西面坐取之降自西階賵者出反位于門外少儀臣為君喪納貨貝於君則曰納甸於有司賵不入廟門賻馬與其幣不入廟門賻者既致命坐委之擯者舉之主人無親受也雜記魯人之贈也三𤣥三纁廣尺長終幅春秋隱公元年天王使宰咺來歸惠公仲子之賵三年武氏子來求賻文公五年王使榮叔歸含且賵公羊傳車馬曰賵貨財曰賻襚禮小宰喪荒受其含禭幣玉之事雜記諸侯相襚以後路與冕服禭者曰寡君使某禭相者入告出曰孤某須矣禭者執冕服左執領右執要入升堂致命曰寡君使某禭子拜稽顙委衣于殯東禭者降受爵辨服於門內霤將命子拜稽顙如初受皮辨服於中庭自西階受朝服自堂受𤣥端將命子拜稽顙皆如初禭者降出反位宰夫五人舉以東降自西階其舉亦西面少儀臣致禭於君則曰致廢衣於賈人春秋左傳襄公二十八年公如楚楚康王卒二十九年春王正月公在楚楚人使公親禭文公九年秦人來歸僖公成風之禭定公九年齊侯伐晉夷儀敝無存死于霤下得其尸公三禭之公羊傳衣被曰禭聞喪禮曾子問諸候祭社稷俎豆既成聞天子崩后之喪君薨夫人之喪如之何孔子曰廢春秋昭公十五年公羊傳公有事于廟聞大夫之喪去樂卒事大夫聞君之喪攝主以往大夫聞大夫之喪尸事畢而往雜記聞兄弟之喪大功以上見喪之鄉而哭奔喪禮禮奔父母之喪見星而行見星而舍過國至竟哭盡哀而止哭辟市朝望其國竟哭至於家入門左升自西階殯東西面坐哭盡哀括髮袒降堂東即位西鄉哭成踊襲絰於序東絞帶反位奔母之喪西面哭盡哀括髮袒降堂東即位西鄉哭成踊襲免絰于序東不及殯先之墓北面坐哭盡哀成踊盡哀括髮東即主人位絰絞帶哭成踊相者告事畢遂冠歸入門左北面哭盡哀括髮袒成踊於又哭括髮成踊於三哭猶括髮成踊三日成服於五哭相者告事畢小記奔父之喪括髮於堂上袒降踊襲絰于東方奔母之喪不括髮袒於堂上降踊襲免于東方絰即位成踊出門哭止三日而五哭三袒奔兄弟之喪先之墓而後之家為位而哭所知之喪則哭於宫而後之墓齊衰望鄉而哭大功望門而哭小功至門而哭緦麻即位而哭通㫖諸侯為天王服斬衰崩則奔喪雜記未服麻而奔喪及主人之未成絰也疏者與主人皆成之親者終其麻帶絰之日數春秋定公十五年邾子來奔喪春秋奔喪於是始朝夕奠禮檀弓朝奠日出夕奠逮日祖祭禮喪祝及祖飾棺乃載遂御檀弓曰祖於庭喪朝禮喪祝及朝御柩乃奠檀弓喪之朝也順死者之孝心也其哀離其室也故至於祖考之廟而後行殷朝而殯於祖周朝而遂葬遣行禮大史遣之日讀誄巾車大喪飾遣車大司馬喪祭奉詔馬牲王喪以馬祭者蓋遣奠也校人大喪飾遣車之馬及葬埋之檀弓國君七介遣車七乘大夫五介遣車五乘儀禮商祝拂匶用功布幠用儀衾檀弓將行遣而行之道齎禮小祝及葬設道齎之奠分禱五祀葬禮喪祝大喪及葬御柩出宫乃代鄉師大喪及葬執纛以與匠師御匶而治役冢人先王之葬居中以昭穆為左右凡諸侯居左右以前卿大夫士居後各以其族凡有功者居前以爵等為丘封之度與其樹數及窆執斧以涖遂入藏凶器方相氏及墓入壙以戈擊四隅歐方良鬯人及葬共其祼器遂貍之校人大喪飾遣車之馬及葬埋之大司樂大喪涖廞樂器及葬藏樂器亦如之司干大喪廞舞器及葬奉而藏之喪大記君葬用楯四綍二碑御棺用羽葆大夫葬用輴二綍二碑御棺用茅土葬用國車二綍無碑比出宫御棺用功布曲禮送葬不辟塗潦春秋左𫝊隱公元年天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至檀弓子思曰三月而葬凡附於棺者必誠必信勿之有悔焉耳矣墓祭禮小宗伯成葬而祭墓冢人凡祭墓為尸愚案古者自天子諸侯以及大夫士莫不有廟有廟必有主故既葬也則作主而奉主以歸于廟嵗時祀之惟庶人無廟則祭之于寢禮無所謂墓祭也後世大夫士家致重墓祭曾不以先王無制而廢之者蓋以墓也者先人體魄之所藏也魂氣必來依焉於是展省而祭之以致其孝之誠敬亦不為非禮也論者且惑於墓祭為尸之文蓋是祭也以初葬日既封為親托體於此以冢人為尸别令有司舍奠以禮地神主人先反而視牲日中而虞自是以吉祭易喪祭明日祔而作主特祀於廟而非常祭于墓之有尸也明矣讀者察焉㑹葬禮春秋左𫝊隱公元年天子七月而葬同軌畢至言同軌以别四夷之國諸侯五月同盟至同在方嶽之盟大夫三月同位至古者行役不踰時士踰月外姻至踰月度月也姻猶親也此言赴弔各以逺近為差因為葬節隱公元年改葬惠公衛侯來㑹葬文公元年葬僖公王使內史叔服來㑹葬文公五年葬我小君成風王使召伯來㑹葬襄公二年齊姜薨齊侯使諸姜宗婦來送葬昭公十五年王穆后崩十二月晉荀躒如周葬穆后定公十五年葬定公滕子來㑹葬哀公二十三年宋景曹卒季康子使冉有弔且送葬曰敝邑有社稷之事使肥與有職競焉是以不得助執紼使求從輿人天子虞禮檀弓既封主人贈而祝宿虞尸既反哭主人與有司視虞牲有司以几筵舍奠于墓左反日中而虞葬日虞不忍一日離也公羊𫝊文公二年作主諸侯虞禮雜記諸侯七虞檀弓虞而立尸有几筵大夫虞禮雜記曰大夫五虞又曰上大夫之虞也少牢下大夫之虞也犆牲士虞禮雜記士三虞儀禮始虞用柔日曰哀子某哀顯相夙興夜處不寧卒哭禮檀弓既卒哭宰夫執木鐸以命于宫曰舍故而諱新自寢門至于庫門曲禮卒哭乃諱喪服小記報赴葬者報虞三月而後卒哭雜記士三月卒哭大夫五月而卒哭諸侯七月而卒哭上大夫卒哭大牢下大夫卒哭少牢檀弓是日也以虞易奠卒哭曰成事左傳僖公三十三年凡君薨卒哭而祔祔禮檀弓葬日虞是日也以吉祭易喪祭明日祔于祖父殷練而祔周卒哭而祔喪服小記士祔於大夫則易牲士大夫不得祔于諸侯祔於諸侯父之為士大夫者其妻祔於諸祖姑妾祔於妾祖姑亡則中一以上而祔祔必以其昭穆諸侯不得祔於天子天子諸侯大夫可以祔於士雜記大夫祔於士士不祔於大夫祔於大夫之昆弟無昆弟則從其昭穆雖王父母在亦然婦祔於其夫之所祔之妃無妃則亦從其昭穆之妃妾祔於妾祖姑無妾祖姑則亦從其昭穆之妾男子祔於王父則配女子祔於王母則不配公子祔於公子春秋左傳僖公三十三年凡君薨卒哭而祔祔而作主作主禮春秋左傳僖公三十三年凡君薨卒哭而祔祔而作主特祀於主蒸嘗禘於廟公羊𫝊虞主用桑練主用栗何氏注狀正方穿中央逆四方天子長尺二寸諸侯長一尺用桑者取其名所以副孝子之心栗猶戰栗謹敬貌士虞禮曰桑主不文吉主皆刻而諡之蓋為禘祫禘時别昭穆也小祥禮士虞禮期而小祥檀弓曰練練衣黃裏縓緣葛要絰繩屨無絇角瑱鹿裘衡長袪袪裼之可也雜記自諸侯達諸士小祥之祭主人之酢也嚌之衆賓兄弟則皆啐之大祥禮士虞禮又期而大祥檀弓祥而縞雜記祥主人之除也於夕為期朝服祥因其故服自諸侯達諸士小祥之祭主人之酢也嚌之衆賓兄弟則皆啐之大祥主人啐之衆賓兄弟皆飲之可也王制三年之喪自天子達禫祭禮士虞禮中月而禫喪大記禫而從御吉祭而復寢間𫝊中月而禫禫而纎無所不佩檀弓是月禫徙月樂孔子既祥五日彈琴而不成聲孟獻子禫縣而不樂比御而不入夫子曰獻子加於人一等矣愚案禫而不御鄭注謂御婦人杜預謂從政而御職事集說取杜說近是則非也古者父母之喪居倚廬不塗寢苫枕由既葬柱楣塗廬既練堊室既祥黝堊皆不御內及禫而內無哭者樂作矣始御內復寢參之孟獻子比御而不入則御為婦人之當御而非御職事明矣然則孟獻子禫縣而不樂比御而不入夫子曰獻子加於人一等矣夫加於人一等是禮過於人矣禮過於人非先王之中制也陳注謂夫子美之恐未必然他日伯魚於出母之喪期而猶哭子路有姊之喪弗除夫子皆抑其過則過於人一等可正矣並有喪禮曽子問並有喪何先何後孔子曰葬先輕而後重其奠也先重而後輕自啓及葬不奠行葬不哀次反葬奠而後辭於殯賔遂修葬事其虞也先重而後輕道遇喪禮檀弓君遇柩於路必使人弔之諡禮大祝大喪帥瞽而廞作匶諡大史小喪賜諡小史掌卿大夫之喪賜諡職喪凡其喪祭詔其號治其禮號謂諡號檀弓死諡周道也曲禮己孤暴貴不為父作諡檀弓公叔文子卒其子戌請諡於君曰日月有時將葬矣請所以易其名者君曰昔者衛國凶饑夫子為粥與國之餓者是不亦惠乎昔者衛國有難夫子以其死衛寡人不亦貞乎夫子聽衛國之政修其班制以與四鄰交衛國之社稷不辱不亦文乎故謂夫子貞惠文子表記曰先王諡以尊名節以一惠恥名之浮於行也誄禮大祝作六辭六曰誄大史遣之日讀誄凡喪事考焉小史卿大夫之喪讀誄曽子問賤不誄貴幼不誄長禮也唯天子稱天以誄之諸侯相誄非禮也檀弓魯莊公及宋人戰于乘丘縣賁父御卜國為右馬驚敗績遂死之圉人浴馬有流矢在白肉公曰非其罪也遂誄之士之有誄自此始也春秋左傳哀公十六年孔丘卒公誄之曰昊天不弔不憗遺一老俾屏豫一人以在位㷀煢豫在疚嗚呼哀哉尼父無自律顧命禮書顧命康王之誥惟四月哉生魄王不懌甲子王乃洮頮水相被冕服憑玉几乃同召大保奭芮伯彤伯畢公衛侯毛公師氏虎臣百尹御事王曰嗚呼疾大漸惟幾病日臻既彌留恐不獲誓言嗣兹豫審訓命汝昔君文王武王宣重光奠麗陳教則肄肄不違用克達殷集大命在後之侗敬迓天威嗣守文武大訓無敢昏逾今天降疾殆弗興弗悟爾尚明時朕言用敬保元子釗𢎞濟于艱難柔逺能邇安勸小大庶邦思夫人自亂于威儀爾無以釗冒貢于非幾兹既受命還出綴衣于庭越翼日乙丑王崩大保命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆子釗於南門之外延入翼室恤宅宗丁卯命作冊度越七日癸酉伯相命士須材狄設黼扆綴衣牖間南嚮敷重篾席黼純華玉仍几西序東嚮敷重底席綴純文貝仍几東序西嚮敷重豐席畫純雕玉仍几西夾南嚮敷重筍席𤣥紛純漆仍几越玉五重陳寶赤刀大訓𢎞璧琬琰在西序大玉夷玉天球河圗在東序𦙍之舞衣大貝鼖鼓在西房兌之戈和之弓垂之竹矢在東房大輅在賓階面綴輅在阼階面先輅在左孰之前次輅在右孰之前二人爵辨執惠立于畢門之內四人綦辨執戈上刃夾兩階戺一人冕執劉立于東堂一人冕執鉞立于西堂一人冕執戣立于東垂一人冕執瞿立于西垂一人冕執鋭立于側階王麻冕黼裳由賓階隮卿士邦君麻冕蟻裳入即位大保大史大宗皆麻冕彤裳大保承介圭上宗奉同瑁由阼階隮大史秉書由賔階隮御王冊命曰皇后憑玉几道揚末命命汝嗣訓臨君周邦率循大卞燮和天下用答揚文武之光訓王載拜興答曰眇眇豫末小子其能而亂四方以敬忌天威乃受同瑁王三宿三祭三咤上宗曰饗大保受同降盥以異同秉章以酢授宗人同拜王答拜大保受同祭嚌咤授宗人同拜王答拜大保降收諸侯出廟門俟王出在應門之內太保率西方諸侯入應門左畢公率東方諸侯入應門右皆布乘黃朱賓稱奉圭兼幣曰一二臣衛敢執壤奠皆載拜稽首王義嗣德答拜大保暨芮伯咸進相揖皆載拜稽首曰敢敬告天子皇天改大邦殷之命惟周文武誕受羑若克恤西土惟新陟王畢協賞罰戡定厥功用敷遺後人休今王敬之哉張皇六師無壞我髙祖寡命王若曰庶邦侯甸男衛惟豫一人釗報誥昔君文武丕平富不務咎底至齊信用昭明于天下則亦有熊羆之士不二心之臣保乂王家用端命于上帝皇天用訓厥道付畀四方乃命建侯樹屏在我後之人今豫一二伯父尚胥暨顧綏爾先公之臣服于先王雖爾身在外乃心罔不在王室用奉恤厥若無遺鞠子羞羣公既皆聽命相揖趨出王釋冕反喪服經禮補逸卷五
