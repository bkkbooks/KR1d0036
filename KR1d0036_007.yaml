body:
  text: 經禮補逸卷七元汪克寬撰軍禮振旅禮書大禹謨禹班師振旅周禮大司馬中春教振旅司馬以旗致民平列陳如戰之陳辨鼓鐸鐲鐃之用王執路鼓諸侯執賁鼓軍將執晉鼓師帥執提旅帥執鼙卒長執鐃兩司馬執鐸公司馬執鐲以教坐作進退疾徐疏數之節大宰作大事則戒于百官贊王命謂助王為教令案春秋傳國之大事在祀與戎小宰以法掌祭祀朝覲會同賔客之戒具軍旅田役喪荒亦如之令百官府共其財用治其施舍聽其治訟大司馬若大師則掌其戒令涖太卜帥執事涖釁主及軍器司戈盾軍旅授二車戈盾建乘車之戈盾授旅賁及虎士戈盾司弓矢凡師役頒弓弩授兵甲之儀司常凡軍事建旌旗大司徒大軍役以旗致萬民而治其徒庶之政令大僕凡軍旅贊王鼓鼓人以鼖鼓鼓軍事凡軍旅夜鼓鼜軍動則鼓其衆巾車掌王之五路革路龍勒條纓五就建太白以即戎車僕掌戎路之萃廣車之萃闕車之萃蘋車之萃輕車之萃凡師共革車各以其萃典路凡軍旅以路從銜枚氏軍旅令銜枚禁嘂呼歎鳴於國中者大師執同律以聽軍聲而詔吉凶幕人軍旅共其帷幕幄帟綬掌次師田則張幕設重帟重案廩人凡師役之事則治其糧與其食封人軍旅則飾其牛牲外饔師役則掌共其獻賜脯肉之事委人軍旅共其委積薪芻遺人凡師役掌其道路之委積小子凡師田斬牲以左右徇陳牛人軍事共其犒牛凡軍旅行役共其兵車之牛小行人若國師役則令稿禬之縣師若將有軍旅田役之戒則受法于司馬以作其衆庶及馬牛車輦會其車人之卒伍使皆備旗鼓兵器以帥而至大司寇凡大軍旅涖戮于社士師大師帥其屬而禁逆軍旅者與犯師禁者而戮之鄉士大軍旅則各掌其鄉之禁令帥其屬夾道而蹕茇舍禮大司馬中夏教茇舍如振旅之陳羣吏撰車徒讀書契辨號名之用帥以門名縣鄙各以其名家以號名鄉以州名野以邑名百官各象其事以辨軍之夜事其他皆如振旅治兵禮大司馬中秋教治兵如振旅之陳辨旗物之用王載大常諸侯載旗軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟各書其事與其號焉其他皆如振旅大閲禮大司馬中冬教大閲前期羣吏戒衆庶修戰法虞人萊所田之野為表百步則一為三表又五十步為一表田之日司馬建旗于後表之中羣吏以旗物鼓鐸鐲鐃各帥其民而致質明弊旗追後至者乃陳車徒如戰之陳皆坐羣吏聽誓于陳前斬牲以左右徇陳曰不用命者斬之中軍以鼙令鼓鼓人皆三鼓司馬振鐸羣吏作旗車徒皆作鼓行鳴鐲車徒皆行及表乃止三鼓摝鐸羣吏弊旗車徒皆坐又三鼓振鐸作旗車徒皆作鼓進鳴鐲車驟徒趨及表乃止坐作如初乃鼓車馳徒走及表乃止鼓戒三闋車三發徒三刺乃鼓退鳴鐃且郤及表乃止坐作如初司常掌九旗之物名各有屬以待國事日月為常交龍為旗通帛為旜雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌及國之大閲贊司馬頒旗物王建大常諸侯建旗孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐道車建旞斿車載旌皆畫其象焉春秋桓公六年八月壬午大閲愚案周禮先王寓軍政於四時之田不廢武備中春教振旅以教坐作進退疾徐疏數之節中夏教茇舍以辨號名之用中秋教治兵以辨旗物之用其他皆如振旅然其法略於三時而致備於中冬者為農隙也故於是時簡車徒精器物屬旗鼓以教衆庶修戰法斬牲徇陳而訓誓之使耳目之衆莫不一心驟趨之節無有異習誅一庸慢甄一用命改易視聽以作其勇敢之氣而民趨勞如趨逸者蓋以其令之素教之善也今桓公乃大閲於煩暑之月不惟妨民失政之非而妄為僭禮之舉是豈事上臨下之道先王教民之意哉故春秋特書之以垂戒焉耳搜田禮大司馬中春教振旅遂以搜田有司表貉誓民鼓遂圍禁火弊獻禽以祭社大司徒大田役以旗致萬民而治其徒庶之政令縣正若將用野民師田行役移執事則帥而至治其政令既役則稽功會事而誅賞鄉師凡四時之田前期出田法于州里簡其鼓鐸旗物兵器修其卒伍及期以司徒之大旗致衆庶而陳之以旗物辨鄉邑而治其政令刑禁巡其前後之屯而戮其犯命者斷其爭禽之訟稍人若有師田行役之事則以縣師之法作其同徒輂輦帥而至治其政令以聽於司馬小宗伯若大田則帥有司而饁獸于郊遂頒禽肆師凡四時之大甸獵祭表貉則為位遂師軍旅田獵平野民掌其禁令比敘其事而賞罰遂人師田作野民帥而至掌其政治禁令甸祝掌四時之田表貉之祝號禱牲掌其祝號小宰以法掌朝覲會同賔客之戒具軍旅田役亦如之令百官府共其財用治其施舍聽其治訟小子凡師田斬牲以左右徇陳巾車掌王之五路木路前樊鵠纓建大麾以田田僕掌馭田路以田以鄙掌佐車之政設驅逆之車令獲者植旌及獻比禽凡田王提馬而走諸侯晉大夫馳校人田獵則帥驅逆之車幕人田役共其帷幕幄帟綬掌次師田則張幕設重帟重案司几筵凡田役則設熊席右漆几司常凡軍事建旌旗田亦如之大僕凡軍旅田役贊王鼓鼓人軍動則鼓其衆田役亦如之司弓矢殺矢鏃矢用諸田獵獸人掌罟田獸辨其名物冬獻狼夏獻麋春秋獻獸物時田則守罟及弊田令禽注于虞中凡田獸者掌其政令山虞若大田獵則萊山田之野及弊田植虞旗于中致禽而珥焉澤虞若大田獵則萊澤野及弊田植虞旌以屬禽迹人凡田獵者受令焉禁麛卵者與其毒矢射者郊特牲季春出火為焚也然後簡其車賦而歷其卒伍而君親誓社以習軍旅左之右之坐之起之以觀其習變也而流示之禽而鹽諸利以觀其不犯命也鹽讀為豔歆豔於利也曲禮國君春田不圍澤大夫不掩羣士不取麛卵詩吉日既張我弓既挾我矢發彼小豝殪此大兕盧令刺荒于田也春秋傳魯昭公八年搜于紅艾蘭以為防置旃以為轅門以葛覆質以為𣙗流旁握御轚者不得入車軌塵馬候蹄掩禽旅御者不失其馳然後射者能中過旁弗逐下從奔之道也愚案艾蘭以為防以大艾草為防營也置旃以為轅門旃旗名謂植旗以為門轅門是植車以為門舍其五十步後表之中謂君表也覆纒質椹𣙗門闑也以毛裘纒質之上以為門闑也流旁握握四寸謂車與門之廣狹相值差偏以寸則轚挂於𣙗驅而不得入矣車軌塵塵不出轍馬候蹄發足疾遲相應也案詩傳朱子謂葛作褐即裘纒質流旁握即間容握文義相同考之車之制具見於考工記輪人輿人之治御之名僅見於保氏五御之目是制莫難於車御莫難於人習莫難於戰所謂以不教民戰是謂棄之也此故因田車之御以閲軍旅之車習民於變為戰之備所謂教於田獵以習五戎是也夫羣卒伍之衆局熊虎之氣三鼓振鐸當車徒驟趨禽獸流崩之時騎射驅逐之際苟御之不以其道勘失之寸則車挂馬潰駭而莫之為射不及中而犯命之罰及之習之為易乎噫御車節奏之法其難如此則夫御人之道又何如哉苗田禮大司馬中夏教茇舍遂以苗田如搜之法車弊獻禽以饗礿王制天子殺則下大綏諸侯殺則下小綏大夫殺則止佐車佐車止則百姓田獵殺獲也下偃仆之也綏旌旗之屬佐車即周禮逆驅之車也獮田禮大司馬中秋教治兵遂以獮田如搜田之法羅弊致禽以祀祊肆師獮之日涖卜來嵗之戒春秋莊公八年春甲午治兵月令季秋天子乃教於田獵以習五戎五戎謂弓矢殳矛戈戟之五兵也狩田禮大司馬中冬教大閲遂以狩田以旌為左右和之門羣吏各帥其車徒以敘和出左右陳車徒有司平之旗居卒間以分地前後有屯百步有司巡其前後險野人為主易野車為主既陳乃設驅逆之車有司表貉于陳前中軍以鼙令鼓鼓人皆三鼓羣司馬振鐸車徒皆作遂鼓行徒銜枚而進大獸公之小獸私之獲者取左耳及所弊鼓皆駴車徒皆譟徒乃弊致禽饁獸于郊入獻禽以享蒸詩車攻田車既好駕言行狩春秋桓公四年春正月公狩于郎愚案郎非國內之狩故書地譏逺也禷禮太祝大師禷上帝詩皇矣篇是類是禡王制天子將出征類乎上帝愚案國之大事在祀與戎此為師祭也師興征伐類于上帝言禮以敬其事也禡禮大司馬有司表貉于陳前甸祝掌四時之田表貉之祝號肆師凡四時之大甸獵祭表貉則為位王制禡於所征之地詩皇矣是類是禡案禡行師之祭也宜禮大祝大師宜于社王制天子將出征宜乎社春秋左傳受脹于社愚案宜出兵祭社之名社所以神地道主隂先王建國左祖右社大社左庫門之內右國社亦在公宫之右皆尚隂也隂主殺故誓社而田因田而習軍旅出征祭之稱其義也然征既宜于社而又類于上帝造于祖禰何哉蓋生殺非王者所得私也類于上帝明奉天討也造于祖禰示受命于廟不敢自専也曰類曰宜曰造祭雖先後不同合周官王制泰誓言之其義各有攸當也造禮大祝掌六祈以同鬼神示二曰造大師造于祖王制天子將出征造乎禰愚案造造而告之之祭也告于祖禰告以道其事而致其敬也考之王制又曰受命于祖泰誓曰受命于文考此蓋因造告卜於廟受命于祖考而後征也祭馬祖禮校人春祭馬祖執駒庾人掌阜馬及祭馬祖詩吉日吉日維戊既伯既禱案伯馬祖也謂天駟房星之神也禱祀而祈之也祭先牧禮校人夏祭先牧頒馬攻特庾人祭間之先牧祭馬社禮校人秋祭馬社臧僕祭馬步禮校人冬祭馬步獻馬講馭夫甸祝裯牲裯馬皆掌其祝號大合軍禮大司馬及師大合軍以行禁令以救無辜伐有罪誓師禮士師以五戒先後刑罰一曰誓用之于軍旅大司徒施十有二教八曰以誓教恤則民不怠書大禹謨禹乃會羣后誓于師曰濟濟有衆咸聽朕命止其克有勳甘誓大戰于甘乃召六卿王曰嗟六事之人豫誓告汝止豫則孥戮汝胤征惟仲康肇位四海胤侯命掌六師羲和廢厥職酒荒于厥邑胤侯承王命徂征告于衆曰嗟豫有衆止其爾衆士懋戒哉湯誓王曰格爾衆庶悉聽朕言止罔有攸赦泰誓惟十有三年春大會于孟津王曰嗟我友邦冢君越我御事庶士明聽誓止時哉不可失維戊午王次于河朔羣后以師畢會王乃徇師而誓曰嗚呼止惟克永世時厥明王乃大巡六師明誓衆士王曰嗚呼我西土君子止維豫小子無良牧誓時甲子昧爽王朝至于商郊牧野乃誓王左杖黃鉞止其于爾躬有戮致師禮環人掌致師大司馬及致建大常比軍衆誅後至者春秋傳宣公十二年楚許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旌摩壘而還樂伯曰吾聞致師者左射以菆代御執轡御下兩馬掉鞅而還攝叔曰吾聞致師者右入壘折馘執俘而還皆行其所聞而復大獻禮大祝軍歸獻于社則前祝大司馬若師有功則左執律右秉鉞以先愷樂獻于社大司樂王師大獻則令奏愷樂樂師凡軍大獻教愷歌遂倡之眂瞭賔射皆奏其鍾鼓鼜愷獻亦如之鏄師軍大獻則鼓其愷樂春秋左傳凡諸侯有四夷之功則獻于王王以警于夷中國則否諸侯不相遺俘僖公二十八年五月丁未晉侯獻楚俘于王駟介百乘徒兵千文公四年寧武子曰諸侯敵王所愾而獻其功王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴成公二年晉侯使鞏朔獻齊捷于周王弗見使單襄公辭焉曰蠻夷戎狄不式王命淫湎毁常王命伐之則有獻捷王親受而勞之所以懲不敬勸有功也兄弟甥舅侵敗王略王命伐之告事而已不獻其功所以敬親昵禁淫慝也今叔父克遂有功於齊而姦先王之禮余雖欲於鞏伯其敢廢舊典以忝叔父夫齊甥舅之國也而大師之後也寧不淫從其欲以怒叔父抑豈不可諫誨士莊伯不能對襄公二十五年鄭伐陳入之子産獻捷于晉戎服將事晉人問陳之罪對曰昔虞閼父為周陶正以服事我先王我先王賴其利器用也與其神明之後也庸以元女大姬配胡公而封諸陳以備三恪則我周之自出至于今是賴桓公之亂蔡人欲立其出我先君莊公奉五父而立之蔡人殺之我又與蔡人奉戴厲公至於莊宣皆我之自立夏氏之亂成公播蕩又我之自入君所知也今陳忘周之大德蔑我大惠棄我姻親介恃楚衆以憑陵我敝邑不可億逞我是以有往年之告未獲成命則有我東門之役當陳隧者井堙木刋敝邑大懼不競而恥大姬天誘其衷啓敝邑心陳知其罪授手于我用敢獻功晉人曰何故戎服對曰我先君武莊為平桓卿士城濮之役文公布命曰各服舊職命我文公戎服輔王以授楚捷不敢廢王命故也士莊伯不能詰乃受之成公二年鄭皇戍如楚獻捷昭公十年季平子伐莒取郠獻俘十七年晉荀吳滅陸渾獻俘于文宫釋奠獻馘禮大祝及軍歸反行舍奠王制出征執有罪反釋奠于學以訊馘告愚案訊者問其首惡馘者截其左耳夫執訊獲醜而反舍奠于先聖先師以是告之者蓋始出征受成于學今師還以武功告成于文德之地明不専恃乎威戮而必任之以德禮也昔僖公在頖獻馘而國人以文武頌之者亦以此歟大均禮大宗伯大均之禮恤衆也大司馬均守平則以安邦國大司徒以土均之法辨五物九等制天下之地征以作民職以令地貢以斂財賦以均齊天下之政小司徒受邦國之比要乃會萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役以比追胥以令貢賦乃分地域而辨其守施其職而平其政土均掌平土地之政以均地守以均地事以均地貢均人掌均人民牛馬車輦之力政以嵗上下書康誥昔君文武丕平富大役禮大宗伯大役之禮任衆也小司徒大軍旅帥其衆庶小軍旅巡役乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者家五人下地家五人可任也者家二人凡起徒役毋過家一人以其餘為羡唯田與追胥竭作鄉大夫以嵗時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之其舍者國中貴者賢者能者服公事者老者疾者皆舍大司馬凡令賦以地與民制之上地食者參之二其民可用者家三人中地食者半其民可用者二家五人下地食者參之一其民可用者家二人大役與慮事屬其植受其要以待考而賞誅縣士邦有大役聚衆庶則各掌其縣春秋左傳凡土功龍見而畢務戒事也火見而致用水昏正而栽日至而畢大封禮大宗伯大封之禮合衆也大司徒辨其邦國都鄙之數制其畿疆而溝封之大司馬制畿封國以正邦國形方氏掌制邦國之地役而正其封疆無有華離之地司几筵凡封國王位設黼依內史凡命諸侯及孤卿大夫則册命之大宗伯王命諸侯則儐大司徒凡建邦國以土圭土其地而制其役諸公之地封疆方五百里其食者半諸侯之地封疆方四百里其食者參之一諸伯之地封疆方百三里其食者參之一諸子之地封疆方二百里其食者四之一諸男之地封疆方百里其食者四之一凡造都鄙制為地域而封溝之以其室數制之不易之地家百畝一易之地家二百畝再易之地家三百畝愚案大司徒論公侯伯子男之地各以封疆言而其食者或半或參之一或四之一參諸王制以田言孟子以班祿言蓋皆専主田祿此正周禮所謂食者也大抵周禮所載凡五等通以封疆言兼附庸在其內王制孟子凡三等専以田祿言附庸不在其列此所以有多寡之殊也嘗考周公之封於魯太公之封於齊孟子所謂侯方百里也然魯頌有曰王曰叔父建爾元子乃命魯公俾侯于東錫之山川土田附庸又曰奄有龜蒙遂荒大東至于海邦淮夷來同此豈魯方百里所能容乎左傳有曰昔召康公命我先君太公夾輔周室賜我先君履東至于海西至于河南至于穆陵北至于無棣此豈齊方百里所能容乎要之周之封爵惟杞宋為上公齊魯爵皆侯侯之封疆方四百里其食者參之一食者參之一則封疆百里有竒正孟子王制所謂侯方百里魯頌所謂錫之土田者也其餘封疆逮三百里正魯頌所謂錫之附庸如魯有邾葛顓臾之類是已職方氏凡邦國千里封公以方五百里則四公方四百里則六侯方三百里則七伯方二百里則二十五子方百里則百男以周知天下周易師上六大君有命開國承家大封告后土禮大宗伯王大封則先告后土大祝建邦國先告后土用牲幣經禮補逸卷七
