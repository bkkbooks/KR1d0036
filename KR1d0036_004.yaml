body:
  text: 經禮補逸卷四元汪克寬撰吉禮天子躬耕禮月令仲春天子親載耒耜措之于參保介之御間帥三公九卿諸侯大夫躬耕帝籍天子三推三公五推卿諸侯九推祭義天子為籍千畝冕而朱紘躬秉耒祭法天子親耕於南郊以共齊盛甸師掌帥其屬而耕耨王籍以時入之以共齊盛舍人以嵗時縣穜稑之種以共王后之春獻種內宰上春詔王后帥六宫之人而生穜稑之種而獻之于王樂記耕籍然後諸侯知所以敬周語古者大史順時覛土陽疸憤盈土氣震發農祥晨正日月底于天廟土乃脉發先時九日大史告稷曰自今至于初吉陽氣俱蒸土膏其動弗震弗渝脉其滿眚榖乃不植稷以告王曰史帥陽官以命我司事曰距今九日土其俱動王其祗祓監農不易王乃使司徒咸戒公卿百吏庶民司空除壇于籍命農大夫咸戒農用先時五日瞽告有協風至王即齊宫百官御事各即其齊三日王乃淳濯饗醴及期鬱人薦鬯犧人薦醴王祼鬯饗醴乃行百吏庶民畢從及籍后稷監之膳夫農正陳籍禮大史贊王王敬從之王耕一墢班三之庶人終于千畝其后稷省功大史監之司徒省民大師監之愚案易繫𫝊曰包犧氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益益卦之象震動於內巽順於外聖人象其物宜立成器以為天下利維其動而順所以有益於民生也後世聖人親載耒耜舉躬耕之禮蓋得於教耕利益不忘本始之意也諸侯躬耕禮祭義曰諸侯為籍百畝冕而青紘躬秉耒祭法諸侯耕於東郊亦以共齊盛后妃親蠶禮內宰上春詔后帥外內命婦始蠶於北郊以為祭服祭統曰王后蠶于北郊以供純服月令季春后妃齊戒親東向躬桑禁婦女毋觀省婦使以勸蠶事夫人親蠶禮祭統曰夫人蠶于北郊以供冕服樂記古者天子諸侯必有公桑蠶室近川而為之築宫仞有三尺棘牆而外閉之及大昕之朝君皮辨素積卜三宫之夫人世婦之吉者使入蠶于蠶室奉種浴于川桑于公桑風戾以食之嵗既單矣世婦卒蠶奉繭以示于君遂獻繭于夫人夫人曰此所以為君服與遂副褘而受之因少牢以禮之祈年禮籥章凡國祈年于田祖吹豳雅擊土鼓以樂田畯月令祈來年于天宗詩雲漢篇祈年孔夙祈麥禮月令季春乃為麥祈實孟冬乃祈來年于天宗大割祀于公社及門閭臘先祖五祀勞農以休息之祈蠶禮月令季春之月天子乃薦鞠衣于先帝案陳氏謂鞠衣后服也后服此帥外內命婦而蠶薦之於神告將服之以蠶也將耕祈榖于上帝所以祈有秋將蠶薦鞠衣于先帝所以祈有春鞠衣謂黃桑之服先帝大皥之屬此為將蠶求福祥之助也王居明堂禮月令孟春之月天子居青陽左個青陽左個大寢東堂北偏仲春之月天子居青陽大廟青陽大廟東堂當大室季春之月天子居青陽右個青陽右個東堂南偏孟夏之月天子居明堂左個明堂左個大寢南堂東偏仲夏之月天子居明堂大廟明堂大廟南堂當大室季夏之月天子居明堂右個明堂右個南堂西偏中央土天子居大廟大室大廟大室中央室也孟秋之月天子居總章左個總章左個大寢西堂南偏仲秋之月天子居總章太廟總章太廟西堂當太室季秋之月天子居總章右個總章右個西堂北偏孟冬之月天子居𤣥堂左個𤣥堂左個北堂西偏仲冬之月天子居𤣥堂大廟𤣥堂大廟北堂當大室季冬之月天子居𤣥堂右個𤣥堂右個北堂東偏太史閏月詔王居門終月闔門左扉立于門中玉藻愚案明堂九室如井田之制蓋本河圖之位也帝出乎震震東方也於時為春陽其於色也為青故春堂名曰青陽以木德王也相見乎離離者明也聖人南面而聽天下嚮明而治故夏堂名曰明堂以火德王也說言乎兌兌正秋也萬物總聚相錯而成文章故秋堂名之以金德王也勞乎坎坎正北方也其色𤣥萬物之所歸也故冬堂名之以水德王也左右之堂名個以其介於四隅也中央堂曰大廟大室猶河圖之中宫也四季十八日天子居焉以土德王也蓋以其為大饗之所故曰大廟然祭帝必於明堂者帝出震而宰萬物是萬物成形於帝也饗帝而以父配之以人成形於父也故季秋物成之時大饗於是焉至堂之覆以茅上圜下方此法天地之象也宜有四户八牖總之為三十六户七十二牖是倍河圗之數而各虛其一為中宫又與四時節候之氣數各有合也然則聖人制器尚象動可為憲於此推之可見矣又案月令載四時天子服器居處各異鄭康成指為秦吕不韋作蓋以篇中有謂大尉百縣三代無之且以季秋受來嵗之朔則建亥為秦正遂深信之而不究其為何代之書也然以參夷赭衣之世豈知孟春之布德焚書滅學之時豈知仲春之舍菜此非秦制明矣考之始皇二十六年併天下方以十月為嵗首而不韋已死於十二年則其誤亦可徵矣要之太尉之官郡縣之制漢實因之布德之詔舍菜之典漢實有之以季秋受朔為正則太初厯未作之前漢儒作此書以記時王之政事或然也而謂吕作初奚據哉因并釋之天子告朔禮玉藻天子聽朔於南門之外閏月則闔門左扉立于其中大史頒告朔于邦國閏月詔王居門終月諸侯告朔禮玉藻諸侯皮辨以聽朔于大廟春秋文公六年禮諸侯受十二月朔政於天子藏于祖廟每月朔朝廟使大夫南面奉天子命君北面而受之受於廟者孝子歸美先君不敢自專也論語子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮書雲禮保章氏以五雲之物辨吉凶水旱降豐荒之祲象春秋公羊傳禮天子有靈臺以候天地諸侯有時臺以候四時詩大雅靈臺篇經始靈臺經之營之左傳僖公五年春王正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也凡分至啓閉必書雲物為備故也開氷禮凌人正嵗十有二月令斬氷三其凌春始治鑑夏頒氷掌事秋刷月令仲春天子鮮羔開氷春秋昭公四年傳曰古者日在北陸而藏氷西陸朝覿而出之其藏之也深山窮谷固隂沍寒於是乎取之其出之也朝之祿位賓食喪祭於是乎用之其藏之也黑牡秬黍以饗司寒其出之也桃弧棘矢以除其災其出入也時食肉之祿氷皆與焉大夫命婦喪浴用氷祭寒而藏之獻羔而啓之公始用之火出而畢賦自命夫命婦至於老疾無不受氷山人取之縣人傳之輿人納之𨽻人藏之詩豳風二之日鑿氷冲冲三之日納于凌隂四之日其蚤獻羔祭韭愚案鑿氷之說見於豳風七月陳王業之詩然自一至四繫以日自四至十繫以月論者謂言月為夏正言日為周正是則一詩之中兼言二正卒有未通愚意是詩必作於公劉居豳之日其後周公遭變故陳后稷先公風化之所由致王業之艱難特因其已成之詩以陳之如箕子陳禹之洪範九疇是也向使此詩作於周公則將與召公篤公劉詩言豳俗之事者皆繫之雅而不繫之豳矣證此則作於公劉居豳之日而豳國本有是歌不足疑也使作於公劉居豳之日則當夏之時用夏之正明矣又何周正之疑哉要之以月繫者其序以歷而論以日言者其數以陽而論一之日者為一陽之月二之日者二陽之月三之日四之日者三陽四陽之月彼以月言者則皆羣隂用事之月也四月六陽而又以月言者陽極則隂生已近乎隂之月也隂以月言陽以日言正猶繫𫝊雜卦始乾終夬以見聖人崇陽抑隂之微意詩人之㫖亦猶是也况首章於一之日二之日之下三之日四之日之上直間以何以卒嵗之說是則二之日為此嵗之終三之日為次嵗之始且四之日獻羔祭韭與月令仲春鮮羔開氷之說合其事以夏正言者為益信矣因通釋之經禮補逸卷四
